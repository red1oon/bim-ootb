<!DOCTYPE html>
<!--
  erp.html — ERP OOTB — AD-driven UI from SQLite WASM
  Implementing ERP_AD_UI.md §8 — Witness: W-ERP-ADUI
  Renders iDempiere Application Dictionary as card-first mobile UI.
  No Three.js. No WebGL. No server. No iDempiere runtime.
  Copyright (c) 2025-2026 Redhuan D. Oon <red1org@gmail.com>
  SPDX-License-Identifier: MIT
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ERP OOTB — Application Dictionary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121218; color: #e8e8ed;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow-y: auto; min-height: 100vh;
    font-size: 14px; line-height: 1.5;
  }
  #breadcrumb {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: rgba(18,18,24,0.92); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 12px 16px; min-height: 48px;
    display: flex; align-items: center; gap: 8px;
  }
  #content {
    margin-top: 52px; margin-bottom: 56px;
    padding: 12px 16px; overflow-y: auto;
    max-width: 960px; margin-left: auto; margin-right: auto;
  }
  #bottom-nav { /* rendered by ad_ui.js */ }
  #loading {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #121218; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #888; font-size: 14px;
  }
  #loading .spinner {
    width: 36px; height: 36px; border: 3px solid #222;
    border-top-color: #6c9fff; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  /* Touch targets */
  button, select, input { min-height: 44px; }
  a { -webkit-tap-highlight-color: transparent; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading ERP OOTB&hellip;</div>
  <div id="load-status" style="margin-top:8px;font-size:11px;color:#555;"></div>
</div>

<div id="breadcrumb"></div>
<div id="content"></div>
<div id="bottom-nav"></div>

<!-- sql.js WASM — local first, CDN fallback -->
<script>
(function () {
  'use strict';
  var statusEl = document.getElementById('load-status');
  function log(msg) {
    console.log('§ERP_HTML ' + msg);
    if (statusEl) statusEl.textContent = msg;
  }

  // ── 1. Script loader ───────────────────────────────────────────────
  function loadScript(url, cdn) {
    return new Promise(function (resolve) {
      var s = document.createElement('script');
      s.src = url;
      s.onload = resolve;
      s.onerror = function () {
        if (cdn) {
          log('CDN fallback for ' + url);
          var s2 = document.createElement('script');
          s2.src = cdn;
          s2.onload = resolve;
          s2.onerror = function () { resolve(); };
          document.head.appendChild(s2);
        } else { resolve(); }
      };
      document.head.appendChild(s);
    });
  }

  // ── 2. Module list — §8 step 3 ────────────────────────────────────
  var V = '?v=20';
  var MODULES = [
    'kernel_ops.js' + V,
    'ad_parser.js' + V,
    'ad_data.js' + V,
    'ad_charts.js' + V,
    'ad_graph.js' + V,
    'erp_search.js' + V,
    'ad_ui.js' + V
  ];

  async function boot() {
    var _bench = {};  // §BENCH timing collection
    var _tBoot = performance.now();

    log('Loading sql.js (FTS5)...');
    var _t0 = performance.now();
    await loadScript('lib/sql-wasm-fts5.js',
      'https://cdn.jsdelivr.net/npm/sql.js-fts5@1.4.0/dist/sql-wasm.js');
    _bench.wasm_load = Math.round(performance.now() - _t0);
    console.log('§BENCH wasm_load=' + _bench.wasm_load + 'ms');

    log('Loading ERP modules...');
    _t0 = performance.now();
    await Promise.all(MODULES.map(function(m) { return loadScript(m); }));
    _bench.modules_load = Math.round(performance.now() - _t0);
    console.log('§BENCH modules_load=' + _bench.modules_load + 'ms (parallel)');

    log('Initialising database...');
    _t0 = performance.now();
    var SQL;
    try {
      SQL = await initSqlJs({ locateFile: function (f) { return 'lib/sql-wasm-fts5.wasm'; } });
    } catch (e) {
      SQL = await initSqlJs({
        locateFile: function () {
          return 'https://cdn.jsdelivr.net/npm/sql.js-fts5@1.4.0/dist/sql-wasm.wasm';
        }
      });
    }
    _bench.sql_init = Math.round(performance.now() - _t0);
    console.log('§BENCH sql_init=' + _bench.sql_init + 'ms');

    // ── IndexedDB cache for ad_seed.db ────────────────────────────────
    function idbGet(key) {
      return new Promise(function (resolve) {
        try {
          var req = indexedDB.open('erp_cache', 1);
          req.onupgradeneeded = function () { req.result.createObjectStore('blobs'); };
          req.onsuccess = function () {
            var tx = req.result.transaction('blobs', 'readonly');
            var get = tx.objectStore('blobs').get(key);
            get.onsuccess = function () { resolve(get.result || null); };
            get.onerror = function () { resolve(null); };
          };
          req.onerror = function () { resolve(null); };
        } catch (e) { resolve(null); }
      });
    }
    function idbPut(key, value) {
      try {
        var req = indexedDB.open('erp_cache', 1);
        req.onupgradeneeded = function () { req.result.createObjectStore('blobs'); };
        req.onsuccess = function () {
          var tx = req.result.transaction('blobs', 'readwrite');
          tx.objectStore('blobs').put(value, key);
        };
      } catch (e) { /* silent */ }
    }

    // ── 3. Load database — §8 step 7: ?db= or ad_seed.db ───────────
    var params = new URLSearchParams(window.location.search);
    var dbUrl = params.get('db');
    var db;

    _t0 = performance.now();
    if (dbUrl) {
      log('Fetching ' + dbUrl + '...');
      try {
        var resp = await fetch(dbUrl);
        var buf = await resp.arrayBuffer();
        db = new SQL.Database(new Uint8Array(buf));
        _bench.db_fetch = Math.round(performance.now() - _t0);
        _bench.db_size = Math.round(buf.byteLength / 1024);
        _bench.db_source = 'url';
        log('Database loaded from ' + dbUrl);
      } catch (e) {
        log('Fetch failed: ' + e.message + ' — using seed');
        db = new SQL.Database();
      }
    } else {
      db = new SQL.Database();
    }

    // ── 4. Load AD seed data (cached in IndexedDB) ─────────────────
    var hasAD = false;
    try {
      var chk = db.exec("SELECT COUNT(*) FROM AD_Menu");
      hasAD = chk.length && Number(chk[0].values[0][0]) > 0;
    } catch (e) { /* table doesn't exist */ }

    if (!hasAD) {
      _t0 = performance.now();
      // Try IndexedDB cache first (v13 = full 378-table GW export, S259)
      var cached = await idbGet('ad_seed_v13');
      var cacheValid = false;
      if (cached && cached.byteLength > 1000) {
        // Validate: must be a real SQLite DB (header = "SQLite format 3")
        var header = new Uint8Array(cached, 0, 16);
        var sig = String.fromCharCode.apply(null, header.slice(0, 6));
        if (sig === 'SQLite') {
          log('Loading from cache...');
          db.close();
          db = new SQL.Database(new Uint8Array(cached));
          _bench.db_fetch = Math.round(performance.now() - _t0);
          _bench.db_size = Math.round(cached.byteLength / 1024);
          _bench.db_source = 'idb_cache';
          cacheValid = true;
          log('Cached (' + (cached.byteLength / 1024 / 1024).toFixed(1) + 'MB)');
        } else {
          console.log('§ERP_HTML cache corrupt (bad header), re-fetching');
        }
      } else if (cached) {
        console.log('§ERP_HTML cache empty (' + (cached ? cached.byteLength : 0) + 'B), re-fetching');
      }
      if (!cacheValid) {
        // Network fetch with progress — progressive first-time experience
        log('Downloading AD seed (13MB, 378 tables)...');
        try {
          var seedResp = await fetch('ad_seed.db');
          var contentLen = seedResp.headers.get('content-length');
          var total = contentLen ? parseInt(contentLen, 10) : 0;
          var reader = seedResp.body ? seedResp.body.getReader() : null;
          var seedBuf;

          if (reader && total > 0) {
            // Progressive fetch with % readout
            var chunks = [];
            var received = 0;
            while (true) {
              var rd = await reader.read();
              if (rd.done) break;
              chunks.push(rd.value);
              received += rd.value.length;
              var pct = Math.round(received / total * 100);
              log('Downloading... ' + pct + '% (' + (received / 1024 / 1024).toFixed(1) + 'MB)');
            }
            var merged = new Uint8Array(received);
            var offset = 0;
            for (var ci = 0; ci < chunks.length; ci++) {
              merged.set(chunks[ci], offset);
              offset += chunks[ci].length;
            }
            seedBuf = merged.buffer;
          } else {
            // Fallback: non-streaming fetch
            seedBuf = await seedResp.arrayBuffer();
          }
          db.close();
          db = new SQL.Database(new Uint8Array(seedBuf));
          // Cache for instant revisits
          idbPut('ad_seed_v13', seedBuf);
          _bench.db_fetch = Math.round(performance.now() - _t0);
          _bench.db_size = Math.round(seedBuf.byteLength / 1024);
          _bench.db_source = 'network';
          log('Loaded + cached (' + (seedBuf.byteLength / 1024 / 1024).toFixed(1) + 'MB)');
        } catch (e) {
          log('AD seed failed: ' + e.message);
        }
      }
    }
    console.log('§BENCH db_fetch=' + (_bench.db_fetch || 0) + 'ms source=' + (_bench.db_source || 'existing') + ' size=' + (_bench.db_size || 0) + 'KB');

    // ── 5. Verify AD loaded — §8 step 4 ─────────────────────────────
    var counts = {};
    ['AD_Menu', 'AD_Window', 'AD_Tab', 'AD_Field'].forEach(function (t) {
      try {
        var r = db.exec('SELECT COUNT(*) FROM ' + t);
        counts[t] = r.length ? Number(r[0].values[0][0]) : 0;
      } catch (e) { counts[t] = -1; }
    });
    console.log('§ERP_HTML ad_counts menu=' + counts.AD_Menu +
                ' windows=' + counts.AD_Window +
                ' tabs=' + counts.AD_Tab +
                ' fields=' + counts.AD_Field);

    // ── 6. Init AD UI — §8 step 5 ──────────────────────────────────
    _t0 = performance.now();
    if (typeof ADUI !== 'undefined') {
      ADUI.init(db,
        document.getElementById('content'),
        document.getElementById('bottom-nav'),
        document.getElementById('breadcrumb')
      );
    }
    _bench.ui_init = Math.round(performance.now() - _t0);
    console.log('§BENCH ui_init=' + _bench.ui_init + 'ms');

    // ── 7. Auto-open window from URL — §8 step 6 ────────────────────
    var windowParam = params.get('window');
    if (windowParam && typeof ADUI !== 'undefined') {
      console.log('§ERP_HTML auto-open window=' + windowParam);
      ADUI.openWindow(Number(windowParam));
    }

    // Hide loading screen
    var loadingEl = document.getElementById('loading');
    if (loadingEl) loadingEl.style.display = 'none';

    _bench.total_boot = Math.round(performance.now() - _tBoot);
    console.log('§BENCH SUMMARY total=' + _bench.total_boot + 'ms wasm=' + _bench.wasm_load +
                'ms modules=' + _bench.modules_load + 'ms sql_init=' + _bench.sql_init +
                'ms db_fetch=' + (_bench.db_fetch||0) + 'ms(' + (_bench.db_source||'-') +
                ') ui_init=' + _bench.ui_init + 'ms db_size=' + (_bench.db_size||0) + 'KB');
    // Extrapolation: log estimated time for 1GB DB
    if (_bench.db_size > 0 && _bench.db_fetch > 0) {
      var perMB = _bench.db_fetch / (_bench.db_size / 1024);
      console.log('§BENCH EXTRAPOLATE 1GB_est=' + Math.round(perMB * 1024) + 'ms' +
                  ' (' + perMB.toFixed(1) + 'ms/MB from ' + (_bench.db_source||'-') + ')');
    }
    console.log('§ERP_HTML boot complete');
  }

  boot().catch(function (e) {
    console.error('§ERP_HTML boot error: ' + e.message);
    var s = document.getElementById('load-status');
    if (s) s.textContent = 'Error: ' + e.message;
  });
})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js?v=398')
    .then(function(r){console.log('§SW_REG scope='+r.scope)})
    .catch(function(e){console.warn('§SW_REG_FAIL',e)});
}
</script>
<script>
// ── Offline badge — persistent top-of-screen indicator ──────────────
(function () {
  function _offlineBadge(show) {
    var id = 'offline-badge';
    var old = document.getElementById(id);
    if (!show) { if (old) old.remove(); return; }
    if (old) return;
    var badge = document.createElement('div');
    badge.id = id;
    badge.textContent = 'OFFLINE';
    badge.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;' +
      'text-align:center;padding:3px 0;font-size:11px;font-weight:600;' +
      'letter-spacing:1px;font-family:system-ui,sans-serif;' +
      'background:rgba(200,30,30,0.9);color:#fff;pointer-events:none;';
    document.body.appendChild(badge);
    // Shift breadcrumb down to avoid overlap
    var bc = document.getElementById('breadcrumb');
    if (bc) bc.style.top = '24px';
    console.log('§OFFLINE_BADGE shown');
  }
  function _onlineRestore() {
    var bc = document.getElementById('breadcrumb');
    if (bc) bc.style.top = '0';
    // Toast
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;' +
      'padding:10px 24px;border-radius:8px;font-size:13px;font-family:system-ui,sans-serif;' +
      'background:rgba(39,174,96,0.92);color:#fff;pointer-events:none;transition:opacity 0.5s;';
    t.textContent = 'Back online';
    document.body.appendChild(t);
    setTimeout(function(){ t.style.opacity='0'; }, 3000);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
    console.log('§ONLINE_RESTORED');
  }
  window.addEventListener('offline', function () { _offlineBadge(true); });
  window.addEventListener('online', function () { _offlineBadge(false); _onlineRestore(); });
  if (!navigator.onLine) _offlineBadge(true);
})();
</script>
</body>
</html>
