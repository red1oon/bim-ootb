<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ERP OOTB — Application Dictionary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121218; color: #e8e8ed;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow-y: auto; min-height: 100vh;
    font-size: 14px; line-height: 1.5;
  }
  #breadcrumb {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: rgba(18,18,24,0.92); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 12px 16px; min-height: 48px;
    display: flex; align-items: center; gap: 8px;
  }
  #content {
    margin-top: 52px; margin-bottom: 56px;
    padding: 12px 16px; overflow-y: auto;
    max-width: 960px; margin-left: auto; margin-right: auto;
  }
  #bottom-nav { /* rendered by ad_ui.js */ }
  #loading {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #121218; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #888; font-size: 14px;
  }
  #loading .spinner {
    width: 36px; height: 36px; border: 3px solid #222;
    border-top-color: #6c9fff; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  /* Touch targets */
  button, select, input { min-height: 44px; }
  a { -webkit-tap-highlight-color: transparent; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  /* Companion Glassbowl views (served from BIMCompiler GitHub Pages) */
  #gbviews { position: fixed; top: 9px; right: 12px; z-index: 11; display: flex; gap: 6px; }
  #gbviews a {
    font-size: 12px; font-weight: 600; color: #cdd6e4; text-decoration: none;
    background: rgba(40,44,58,0.82); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 6px 11px; min-height: 0; line-height: 1;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  #gbviews a:hover { border-color: #56d6e0; color: #56d6e0; }
</style>
</head>

</div>

<div id="breadcrumb"></div>
<div id="content"></div>

<!-- §INSTANT Phase 1: globe renders from initbubble.json in <300ms -->
<script src="ad_graph.js?v=22"></script>
<script src="ad_ui.js?v=22"></script>
<script>
// Phase 1: Instant constellation — fetch initbubble.json, then init
var _shellReady = false;
(function () {
  'use strict';
  var _tBoot = performance.now();

  // Compiled manifest — structure for the 7 curated windows (parallel, non-blocking).
  fetch('manifest.json?v=22').then(function(r) { return r.json(); }).then(function(mf) {
    window.AD_MANIFEST = mf;
    console.log('§BENCH manifest loaded windows=' + Object.keys(mf.windows || {}).length);
  }).catch(function(e) { console.log('§BENCH manifest fetch failed: ' + e.message); });

  fetch('initbubble.json?v=22').then(function(r) { return r.json(); }).then(function(data) {
    window.INIT_BUBBLES = data;

    var params = new URLSearchParams(window.location.search);
    var clientParam = params.get('client');
    if (clientParam && typeof ADUI !== 'undefined') {
      ADUI.setClient(clientParam);
    }

    if (typeof ADUI !== 'undefined') {
      ADUI.init(null,
        document.getElementById('content'),
        document.getElementById('bottom-nav'),
        document.getElementById('breadcrumb')
      );
    }

    var loadingEl = document.getElementById('loading');
    if (loadingEl) loadingEl.style.display = 'none';

    _shellReady = true;
    var shellMs = Math.round(performance.now() - _tBoot);
    console.log('§BENCH shell_render=' + shellMs + 'ms (instant globe)');
  }).catch(function(e) {
    console.log('§BENCH initbubble fetch failed: ' + e.message);
    _shellReady = true; // let Phase 2 proceed anyway
  });
})();
</script>

<!-- §INSTANT Phase 2: background hydration — WASM + DB + full modules -->
<script>
(function () {
  'use strict';
  var _bench = {};
  var _tHydrate = performance.now();

  function log(msg) {
    console.log('§ERP_HTML ' + msg);
  }

  function loadScript(url, cdn) {
    return new Promise(function (resolve) {
      var s = document.createElement('script');
      s.src = url;
      s.onload = resolve;
      s.onerror = function () {
        if (cdn) {
          log('CDN fallback for ' + url);
          var s2 = document.createElement('script');
          s2.src = cdn;
          s2.onload = resolve;
          s2.onerror = function () { resolve(); };
          document.head.appendChild(s2);
        } else { resolve(); }
      };
      document.head.appendChild(s);
    });
  }

  var V = '?v=22';
  // Modules NOT loaded in Phase 1 (ad_graph.js + ad_ui.js already loaded)
  var MODULES = [
    'kernel_ops.js' + V,
    'ad_parser.js' + V,
    'ad_data.js' + V,
    'ad_charts.js' + V,
    'erp_search.js' + V,
    'erp_signer.js' + V,    // A2 W-SIGN — edge ECDSA-P256 signer (scripts/test_kernel_sign.js)
    'erp_replay.js' + V,    // A3 W-OWNER/CAS — guarded ERP replay (scripts/test_kernel_owner.js)
    'erp_persist.js' + V,   // A4 W-PERSIST — durable local + signed-snapshot hook (scripts/test_kernel_persist.js)
    'qrcode.min.js' + V
  ];

  // IndexedDB helpers
  function idbGet(key) {
    return new Promise(function (resolve) {
      try {
        var req = indexedDB.open('erp_cache', 1);
        req.onupgradeneeded = function () { req.result.createObjectStore('blobs'); };
        req.onsuccess = function () {
          var tx = req.result.transaction('blobs', 'readonly');
          var get = tx.objectStore('blobs').get(key);
          get.onsuccess = function () { resolve(get.result || null); };
          get.onerror = function () { resolve(null); };
        };
        req.onerror = function () { resolve(null); };
      } catch (e) { resolve(null); }
    });
  }
  function idbPut(key, value) {
    try {
      var req = indexedDB.open('erp_cache', 1);
      req.onupgradeneeded = function () { req.result.createObjectStore('blobs'); };
      req.onsuccess = function () {
        var tx = req.result.transaction('blobs', 'readwrite');
        tx.objectStore('blobs').put(value, key);
      };
    } catch (e) { /* silent */ }
  }

  async function hydrate() {
    // ── Load WASM + modules in parallel ─────────────────────────────
    var _t0 = performance.now();
    var wasmPromise = loadScript('lib/sql-wasm-fts5.js',
      'https://cdn.jsdelivr.net/npm/sql.js-fts5@1.4.0/dist/sql-wasm.js');
    var modulesPromise = Promise.all(MODULES.map(function(m) { return loadScript(m); }));
    await Promise.all([wasmPromise, modulesPromise]);
    _bench.parallel_load = Math.round(performance.now() - _t0);
    console.log('§BENCH parallel_load=' + _bench.parallel_load + 'ms (wasm+modules)');

    // ── Phase A wiring (modules now loaded) — edge concerns, proven in scripts/test_kernel_*.js;
    //    see prompts/ERP_PHASE_A_SETTLE.md. A2: install the edge signer on the live W-CHAIN.
    //    A4: request durable storage. Both are best-effort + non-blocking (never fail hydrate).
    if (window.ErpSigner && window.KernelOps) {
      ErpSigner.installSigner(window.KernelOps).catch(function (e) { console.warn('§SIGN install error', e); });
    }
    if (window.ErpPersist) { ErpPersist.requestPersist(); }   // §PERSIST persisted=<granted>

    // ── Init SQL engine ─────────────────────────────────────────────
    _t0 = performance.now();
    var SQL;
    try {
      SQL = await initSqlJs({ locateFile: function (f) { return 'lib/sql-wasm-fts5.wasm'; } });
    } catch (e) {
      SQL = await initSqlJs({
        locateFile: function () {
          return 'https://cdn.jsdelivr.net/npm/sql.js-fts5@1.4.0/dist/sql-wasm.wasm';
        }
      });
    }
    _bench.sql_init = Math.round(performance.now() - _t0);
    console.log('§BENCH sql_init=' + _bench.sql_init + 'ms');

    // ── Load database ───────────────────────────────────────────────
    var params = new URLSearchParams(window.location.search);
    var dbUrl = params.get('db');
    var db;

    _t0 = performance.now();
    if (dbUrl) {
      log('Fetching ' + dbUrl + '...');
      try {
        var resp = await fetch(dbUrl);
        var buf = await resp.arrayBuffer();
        db = new SQL.Database(new Uint8Array(buf));
        _bench.db_fetch = Math.round(performance.now() - _t0);
        _bench.db_size = Math.round(buf.byteLength / 1024);
        _bench.db_source = 'url';
      } catch (e) {
        log('Fetch failed: ' + e.message + ' — using seed');
        db = new SQL.Database();
      }
    } else {
      db = new SQL.Database();
    }

    // ── Load AD seed (IndexedDB cache → network) ────────────────────
    var hasAD = false;
    try {
      var chk = db.exec("SELECT COUNT(*) FROM AD_Menu");
      hasAD = chk.length && Number(chk[0].values[0][0]) > 0;
    } catch (e) { /* table doesn't exist */ }

    if (!hasAD) {
      _t0 = performance.now();
      var cached = await idbGet('ad_seed_v13');
      var cacheValid = false;
      if (cached && cached.byteLength > 1000) {
        var header = new Uint8Array(cached, 0, 16);
        var sig = String.fromCharCode.apply(null, header.slice(0, 6));
        if (sig === 'SQLite') {
          db.close();
          db = new SQL.Database(new Uint8Array(cached));
          _bench.db_fetch = Math.round(performance.now() - _t0);
          _bench.db_size = Math.round(cached.byteLength / 1024);
          _bench.db_source = 'idb_cache';
          cacheValid = true;
        }
      }
      if (!cacheValid) {
        try {
          var seedResp = await fetch('ad_seed.db');
          var contentLen = seedResp.headers.get('content-length');
          var total = contentLen ? parseInt(contentLen, 10) : 0;
          var reader = seedResp.body ? seedResp.body.getReader() : null;
          var seedBuf;
          if (reader && total > 0) {
            var chunks = [], received = 0;
            while (true) {
              var rd = await reader.read();
              if (rd.done) break;
              chunks.push(rd.value);
              received += rd.value.length;
            }
            var merged = new Uint8Array(received);
            var offset = 0;
            for (var ci = 0; ci < chunks.length; ci++) {
              merged.set(chunks[ci], offset);
              offset += chunks[ci].length;
            }
            seedBuf = merged.buffer;
          } else {
            seedBuf = await seedResp.arrayBuffer();
          }
          db.close();
          db = new SQL.Database(new Uint8Array(seedBuf));
          idbPut('ad_seed_v13', seedBuf);
          _bench.db_fetch = Math.round(performance.now() - _t0);
          _bench.db_size = Math.round(seedBuf.byteLength / 1024);
          _bench.db_source = 'network';
        } catch (e) {
          log('AD seed failed: ' + e.message);
        }
      }
    }
    console.log('§BENCH db_fetch=' + (_bench.db_fetch || 0) + 'ms source=' + (_bench.db_source || 'existing') +
                ' size=' + (_bench.db_size || 0) + 'KB');

    // A5: expose the live DB so the Verify-ledger control can read the kernel op-log (window.KernelOps).
    window.__erpDb = db;

    // ── Wait for Phase 1 shell, then hydrate silently ────────────────
    function _waitAndHydrate() {
      if (typeof _shellReady !== 'undefined' && _shellReady) {
        ADUI.hydrate(db);
      } else {
        setTimeout(_waitAndHydrate, 50);
      }
    }
    if (typeof ADUI !== 'undefined') {
      _waitAndHydrate();
    }

    // §19 Deep links (now that DB is ready)
    var windowParam = params.get('window');
    if (windowParam && typeof ADUI !== 'undefined') {
      console.log('§ERP_HTML auto-open window=' + windowParam);
      ADUI.openWindow(Number(windowParam));
      var recordParam = params.get('record');
      if (recordParam) {
        console.log('§ERP_HTML auto-record=' + recordParam);
        ADUI.navToRecord(recordParam);
      }
    }

    _bench.total_hydrate = Math.round(performance.now() - _tHydrate);
    console.log('§BENCH HYDRATE total=' + _bench.total_hydrate + 'ms parallel=' + _bench.parallel_load +
                'ms sql=' + _bench.sql_init + 'ms db=' + (_bench.db_fetch||0) + 'ms(' + (_bench.db_source||'-') +
                ') size=' + (_bench.db_size||0) + 'KB');
    console.log('§ERP_HTML hydrate complete');
  }

  hydrate().catch(function (e) {
    console.error('§ERP_HTML hydrate error: ' + e.message);
  });
})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js?v=558')

    .catch(function(e){console.warn('§SW_REG_FAIL',e)});

<script>
// ── Offline badge — persistent top-of-screen indicator ──────────────
(function () {
  function _offlineBadge(show) {
    var id = 'offline-badge';
    var old = document.getElementById(id);
    if (!show) { if (old) old.remove(); return; }
    if (old) return;
    var badge = document.createElement('div');
    badge.id = id;
    badge.textContent = 'OFFLINE';
    badge.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;' +
      'text-align:center;padding:3px 0;font-size:11px;font-weight:600;' +
      'letter-spacing:1px;font-family:system-ui,sans-serif;' +
      'background:rgba(200,30,30,0.9);color:#fff;pointer-events:none;';
    document.body.appendChild(badge);
    // Shift breadcrumb down to avoid overlap
    var bc = document.getElementById('breadcrumb');
    if (bc) bc.style.top = '24px';
    console.log('§OFFLINE_BADGE shown');
  }
  function _onlineRestore() {
    var bc = document.getElementById('breadcrumb');
    if (bc) bc.style.top = '0';
    // Toast
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;' +
      'padding:10px 24px;border-radius:8px;font-size:13px;font-family:system-ui,sans-serif;' +
      'background:rgba(39,174,96,0.92);color:#fff;pointer-events:none;transition:opacity 0.5s;';
    t.textContent = 'Back online';
    document.body.appendChild(t);
    setTimeout(function(){ t.style.opacity='0'; }, 3000);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
    console.log('§ONLINE_RESTORED');
  }
  window.addEventListener('offline', function () { _offlineBadge(true); });
  window.addEventListener('online', function () { _offlineBadge(false); _onlineRestore(); });
  if (!navigator.onLine) _offlineBadge(true);
})();
</script>
<script>
// ── A5 Verify ledger — surface KernelOps.verifyChain() (W-CHAIN/W-SIGN). Reads the live kernel op-log
//    on window.__erpDb; shows "Ledger OK — N ops" or "Tamper at op N". Logic proven in
//    scripts/test_kernel_chain.js + test_kernel_sign.js. See prompts/ERP_PHASE_A_SETTLE.md §A5.
(function () {
  'use strict';
  function _toast(msg, good) {
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;' +
      'padding:10px 24px;border-radius:8px;font-size:13px;font-family:system-ui,sans-serif;transition:opacity .5s;' +
      'background:' + (good ? 'rgba(39,174,96,0.92)' : 'rgba(200,30,30,0.92)') + ';color:#fff;pointer-events:none;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.style.opacity = '0'; }, 3000);
    setTimeout(function () { if (t.parentNode) t.remove(); }, 3500);
  }
  function verifyLedger() {
    var db = window.__erpDb;
    if (!db || !window.KernelOps || !KernelOps.verifyChain) { _toast('Ledger not ready', false); return; }
    return KernelOps.verifyChain(db).then(function (r) {
      console.log('§VERIFY_LEDGER ok=' + r.ok + (r.ok ? ' len=' + r.len : ' brokeAt=' + r.brokeAt + ' why=' + r.why));
      _toast(r.ok ? ('Ledger OK — ' + r.len + ' ops sealed') : ('Tamper at op ' + r.brokeAt + ' (' + r.why + ')'), r.ok);
      return r;
    }).catch(function (e) { console.warn('§VERIFY_LEDGER error', e); _toast('Verify error', false); });
  }
  window.ErpVerifyLedger = verifyLedger;
  // Unobtrusive control — bottom-left, clear of #gbviews (top-right) and the offline badge (top).
  var b = document.createElement('button');
  b.id = 'verify-ledger-pill';
  b.type = 'button';
  b.textContent = '⛓ Verify ledger';
  b.style.cssText = 'position:fixed;bottom:10px;left:12px;z-index:9999;min-height:0;' +
    'font-size:12px;font-weight:600;color:#cdd6e4;background:rgba(40,44,58,0.82);' +
    'border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:6px 11px;line-height:1;' +
    'backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;';
  b.addEventListener('click', verifyLedger);
  document.body.appendChild(b);
  console.log('§VERIFY_LEDGER control mounted');
})();
</script>
</body>
