<!DOCTYPE html>
<!--
  idempiere.html вҖ” Renderer #1 of N ("pick your ERP") вҖ” iDempiere-classic chrome.
  Implementing prompts/idempiereUI.md (I1) + docs/IDEMPIERE_RENDERER_SPEC.md В§3.
  POC: a faithful iDempiere DESKTOP UI folded entirely from the Application Dictionary in
  ad_seed.db via SQLite WASM вҖ” no server, no iDempiere runtime. Desktop = exact; mobile = adapted.
  Reuses ad_parser.js + ad_data.js (the engine) вҖ” the chrome here is the only new surface.
  Copyright (c) 2025-2026 Redhuan D. Oon <red1org@gmail.com>
  SPDX-License-Identifier: MIT
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iDempiere вҖ” Application Dictionary (SQLite WASM)</title>
<style>
  /* в”Җв”Җ iDempiere-classic palette (modern/ZK default theme: blue header, light body) в”Җв”Җ */
  :root {
    --idmp-header:#1c5fa8; --idmp-header2:#16487f; --idmp-blue:#1c5fa8;
    --idmp-bg:#eef1f5; --idmp-panel:#ffffff; --idmp-border:#cdd4de;
    --idmp-text:#2b333d; --idmp-muted:#6b7681; --idmp-hover:#e8f0fa; --idmp-sel:#d6e6f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:'Segoe UI', Tahoma, system-ui, sans-serif; font-size:13px;
    color:var(--idmp-text); background:var(--idmp-bg);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* в”Җв”Җ Header bar в”Җв”Җ */
  #idmp-header {
    flex:0 0 auto; height:46px; display:flex; align-items:center; gap:12px; padding:0 12px;
    background:linear-gradient(180deg,var(--idmp-header),var(--idmp-header2)); color:#fff;
    box-shadow:0 1px 4px rgba(0,0,0,0.25); z-index:30;
  }
  /* Neutral blank-name mark (A+) вҖ” not the trademarked iDempiere logo (ethics) */
  #idmp-logo { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
    background:#fff; color:var(--idmp-header); border-radius:5px; font-weight:800; font-size:13px; letter-spacing:-.5px; }
  #idmp-title { font-size:15px; font-weight:600; letter-spacing:.2px; }
  #idmp-search {
    flex:1; max-width:360px; height:28px; border:none; border-radius:14px; padding:0 12px;
    font-size:13px; background:rgba(255,255,255,0.92); color:#2b333d;
  }
  #idmp-header .spacer { flex:1; }
  #idmp-header .ctx { font-size:12px; opacity:.92; white-space:nowrap; }
  #idmp-header .hbtns { display:flex; gap:2px; }
  #idmp-header .hbtns button {
    width:32px; height:32px; border:none; background:transparent; color:#fff; cursor:pointer;
    border-radius:4px; display:flex; align-items:center; justify-content:center;
  }
  #idmp-header .hbtns button:hover { background:rgba(255,255,255,0.18); }
  #idmp-burger { display:none; }
  /* в”Җв”Җ Body split в”Җв”Җ */
  #idmp-body { flex:1; display:flex; min-height:0; }
  /* в”Җв”Җ Left menu panel в”Җв”Җ */
  #idmp-menu {
    flex:0 0 262px; background:var(--idmp-panel); border-right:1px solid var(--idmp-border);
    display:flex; flex-direction:column; min-height:0;
  }
  #idmp-menu-head { padding:8px; border-bottom:1px solid var(--idmp-border); }
  #idmp-menu-filter {
    width:100%; height:30px; border:1px solid var(--idmp-border); border-radius:4px; padding:0 8px; font-size:13px;
  }
  #idmp-tree { flex:1; overflow-y:auto; padding:4px 0; }
  .idmp-node { user-select:none; }
  .idmp-row {
    display:flex; align-items:center; gap:6px; padding:4px 8px; cursor:pointer; white-space:nowrap;
    border-left:3px solid transparent; font-size:13px;
  }
  .idmp-row:hover { background:var(--idmp-hover); }
  .idmp-row.leaf.active { background:var(--idmp-sel); border-left-color:var(--idmp-blue); font-weight:600; }
  .idmp-row .tw { width:12px; display:inline-block; color:var(--idmp-muted); font-size:10px; }
  .idmp-row .ic { width:16px; text-align:center; color:var(--idmp-blue); }
  .idmp-children { display:none; }
  .idmp-node.open > .idmp-children { display:block; }
  /* в”Җв”Җ Main content в”Җв”Җ */
  #idmp-main { flex:1; display:flex; flex-direction:column; min-height:0; background:var(--idmp-bg); }
  /* window MDI tabs */
  #idmp-wintabs {
    flex:0 0 auto; display:flex; align-items:flex-end; gap:2px; padding:6px 8px 0; background:var(--idmp-bg);
    border-bottom:1px solid var(--idmp-border); overflow-x:auto; min-height:34px;
  }
  .idmp-wintab {
    display:flex; align-items:center; gap:6px; padding:6px 12px; background:#dde4ec; cursor:pointer;
    border:1px solid var(--idmp-border); border-bottom:none; border-radius:6px 6px 0 0; font-size:13px; color:var(--idmp-muted);
  }
  .idmp-wintab.active { background:var(--idmp-panel); color:var(--idmp-text); font-weight:600; }
  .idmp-wintab .x { color:var(--idmp-muted); font-weight:700; padding:0 2px; border-radius:3px; }
  .idmp-wintab .x:hover { background:#c33; color:#fff; }
  /* toolbar */
  #idmp-toolbar {
    flex:0 0 auto; display:flex; align-items:center; gap:3px; padding:5px 8px; background:var(--idmp-panel);
    border-bottom:1px solid var(--idmp-border); overflow-x:auto;
  }
  #idmp-toolbar button {
    height:30px; min-width:30px; border:1px solid transparent; border-radius:4px; background:transparent;
    color:var(--idmp-text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px;
    font-size:13px; padding:0 7px;
  }
  #idmp-toolbar button:hover:not(:disabled) { background:var(--idmp-hover); border-color:var(--idmp-border); }
  #idmp-toolbar button:disabled { opacity:.38; cursor:default; }
  #idmp-toolbar .sep { width:1px; height:20px; background:var(--idmp-border); margin:0 4px; }
  #idmp-toolbar .nav { font-size:12px; color:var(--idmp-muted); padding:0 6px; white-space:nowrap; }
  /* AD tab-strip */
  #idmp-tabstrip {
    flex:0 0 auto; display:flex; gap:2px; padding:6px 8px 0; background:var(--idmp-panel);
    border-bottom:1px solid var(--idmp-border); overflow-x:auto;
  }
  .idmp-adtab {
    padding:6px 14px; cursor:pointer; font-size:13px; color:var(--idmp-muted);
    border-bottom:2px solid transparent; white-space:nowrap;
  }
  .idmp-adtab.active { color:var(--idmp-blue); border-bottom-color:var(--idmp-blue); font-weight:600; }
  /* body */
  #idmp-content { flex:1; overflow:auto; padding:14px; min-height:0; }
  #idmp-placeholder { color:var(--idmp-muted); text-align:center; margin-top:14vh; font-size:14px; }
  #idmp-placeholder .big { font-size:34px; margin-bottom:10px; opacity:.5; }
  /* form */
  .idmp-form { display:grid; grid-template-columns:repeat(2, minmax(280px, 1fr)); gap:8px 28px; max-width:980px; }
  .idmp-fld { display:flex; align-items:center; gap:10px; }
  .idmp-fld label { flex:0 0 150px; text-align:right; color:var(--idmp-muted); font-size:12px; }
  .idmp-fld .val {
    flex:1; min-height:28px; border:1px solid var(--idmp-border); border-radius:3px; padding:4px 8px;
    background:#fbfcfe; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .idmp-fld .val.bool { border:none; background:transparent; }
  .idmp-fld.mand .val { border-left:3px solid #e0a800; }
  /* grid */
  .idmp-grid { width:100%; border-collapse:collapse; background:var(--idmp-panel); font-size:12.5px; }
  .idmp-grid th, .idmp-grid td {
    border:1px solid var(--idmp-border); padding:5px 9px; text-align:left; white-space:nowrap;
    max-width:280px; overflow:hidden; text-overflow:ellipsis;
  }
  .idmp-grid th { background:#eaeef3; position:sticky; top:0; font-weight:600; }
  .idmp-grid tr { cursor:pointer; }
  .idmp-grid tr:nth-child(even) td { background:#f6f8fb; }
  .idmp-grid tr:hover td { background:var(--idmp-hover); }
  .idmp-grid tr.sel td { background:var(--idmp-sel); }
  /* status bar */
  #idmp-status {
    flex:0 0 auto; height:26px; display:flex; align-items:center; gap:10px; padding:0 12px;
    background:#dfe5ec; border-top:1px solid var(--idmp-border); color:var(--idmp-muted); font-size:11.5px;
  }
  #idmp-status .seal { color:#2e7d32; }
  /* loading */
  #idmp-loading {
    position:fixed; inset:0; background:var(--idmp-bg); z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--idmp-muted);
  }
  #idmp-loading .sp { width:34px; height:34px; border:3px solid #cfd8e3; border-top-color:var(--idmp-blue); border-radius:50%; animation:sp .8s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  /* в”Җв”Җ Mobile adaptation (desktop is exact; mobile may adapt) в”Җв”Җ */
  @media (max-width:760px) {
    #idmp-burger { display:flex; }
    #idmp-search { display:none; }
    #idmp-menu {
      position:fixed; top:46px; bottom:0; left:0; z-index:25; flex-basis:80vw; max-width:320px;
      transform:translateX(-105%); transition:transform .22s ease; box-shadow:2px 0 12px rgba(0,0,0,0.2);
    }
    body.menu-open #idmp-menu { transform:translateX(0); }
    .idmp-form { grid-template-columns:1fr; }
    .idmp-fld label { flex-basis:110px; }
  }
</style>
</head>
<body>

<div id="idmp-loading"><div class="sp"></div><div id="idmp-load-msg">Loading iDempiere вҖ” folding the Application Dictionary from SQLite&hellip;</div></div>

<div id="idmp-header">
  <button id="idmp-burger" class="hbtns"><button title="Menu">&#9776;</button></button>
  <span id="idmp-logo">A+</span>
  <span id="idmp-title">iDempiere&#8209;like</span>
  <input id="idmp-search" type="search" placeholder="Search menu&hellip;" autocomplete="off">
  <span class="spacer"></span>
  <span class="ctx" id="idmp-ctx">GardenWorld В· System Administrator</span>
  <span class="hbtns">
    <button id="idmp-home-btn" title="Home / Engine view (erp.html)">&#8962;</button>
    <button title="Help" id="idmp-help-btn">?</button>
  </span>
</div>

<div id="idmp-body">
  <aside id="idmp-menu">
    <div id="idmp-menu-head"><input id="idmp-menu-filter" type="search" placeholder="Filter menu&hellip;" autocomplete="off"></div>
    <div id="idmp-tree"></div>
  </aside>
  <main id="idmp-main">
    <div id="idmp-wintabs"></div>
    <div id="idmp-toolbar" style="display:none"></div>
    <div id="idmp-tabstrip" style="display:none"></div>
    <div id="idmp-content">
      <div id="idmp-placeholder"><div class="big">&#128193;</div>Select a menu item to open a window.<br>Every window, tab and field is folded from <b>ad_seed.db</b> via SQLite WASM.</div>
    </div>
    <div id="idmp-status"><span id="idmp-status-main">Ready</span><span class="spacer" style="flex:1"></span><span class="seal" id="idmp-status-src">folded from SQLite WASM</span></div>
  </main>
</div>

<script src="ad_parser.js?v=22"></script>
<script src="ad_data.js?v=22"></script>
<script>
(function () {
  'use strict';
  var _t0 = performance.now();
  var db = null;
  var ADP = window.ADParser, ADD = window.ADData;

  // open-window state (a faithful single-window desktop; MDI tabs track opened windows)
  var _openWins = {};        // windowId -> { win, name }
  var _activeWin = null;     // windowId
  var _activeTabIdx = 0;
  var _records = [];
  var _recIdx = 0;
  var _viewMode = 'grid';    // 'grid' | 'form'

  function $(id) { return document.getElementById(id); }
  function el(tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }
  function status(main) { if (main != null) $('idmp-status-main').textContent = main; }

  // в”Җв”Җ IndexedDB cache (shares 'ad_seed_v13' with erp.html) в”Җв”Җ
  function idbGet(key) {
    return new Promise(function (resolve) {
      try {
        var req = indexedDB.open('erp_cache', 1);
        req.onupgradeneeded = function () { req.result.createObjectStore('blobs'); };
        req.onsuccess = function () {
          var tx = req.result.transaction('blobs', 'readonly');
          var g = tx.objectStore('blobs').get(key);
          g.onsuccess = function () { resolve(g.result || null); };
          g.onerror = function () { resolve(null); };
        };
        req.onerror = function () { resolve(null); };
      } catch (e) { resolve(null); }
    });
  }
  function idbPut(key, val) {
    try {
      var req = indexedDB.open('erp_cache', 1);
      req.onupgradeneeded = function () { req.result.createObjectStore('blobs'); };
      req.onsuccess = function () { req.result.transaction('blobs', 'readwrite').objectStore('blobs').put(val, key); };
    } catch (e) {}
  }
  function loadScript(url, cdn) {
    return new Promise(function (resolve) {
      var s = document.createElement('script'); s.src = url; s.onload = resolve;
      s.onerror = function () { if (cdn) { var s2 = document.createElement('script'); s2.src = cdn; s2.onload = resolve; s2.onerror = function(){resolve();}; document.head.appendChild(s2); } else resolve(); };
      document.head.appendChild(s);
    });
  }

  async function boot() {
    await loadScript('lib/sql-wasm-fts5.js', 'https://cdn.jsdelivr.net/npm/sql.js-fts5@1.4.0/dist/sql-wasm.js');
    var SQL;
    try { SQL = await initSqlJs({ locateFile: function () { return 'lib/sql-wasm-fts5.wasm'; } }); }
    catch (e) { SQL = await initSqlJs({ locateFile: function () { return 'https://cdn.jsdelivr.net/npm/sql.js-fts5@1.4.0/dist/sql-wasm.wasm'; } }); }

    var src = 'network';
    var cached = await idbGet('ad_seed_v13');
    if (cached && cached.byteLength > 1000) {
      var sig = String.fromCharCode.apply(null, new Uint8Array(cached, 0, 6));
      if (sig === 'SQLite') { db = new SQL.Database(new Uint8Array(cached)); src = 'idb_cache'; }
    }
    if (!db) {
      var resp = await fetch('ad_seed.db'); var buf = await resp.arrayBuffer();
      db = new SQL.Database(new Uint8Array(buf)); idbPut('ad_seed_v13', buf);
    }
    window.__idmpDb = db;
    if (ADP && ADP.init) ADP.init(db);
    console.log('В§IDEMPIERE boot db=' + src + ' ms=' + Math.round(performance.now() - _t0));

    buildMenu();
    $('idmp-loading').style.display = 'none';

    // deep link ?window=<id>
    var wid = new URLSearchParams(location.search).get('window');
    if (wid) openWindow(Number(wid));
  }

  // в”Җв”Җ Left menu tree (folded from AD_Menu) в”Җв”Җ
  function buildMenu() {
    var roots = (ADP && ADP.getMenuTree) ? ADP.getMenuTree(db) : [];
    var tree = $('idmp-tree'); tree.innerHTML = '';
    var groups = 0, leaves = 0;
    roots.forEach(function (n) { var r = renderNode(n); tree.appendChild(r.dom); groups += r.groups; leaves += r.leaves; });
    console.log('В§IDEMPIERE menu groups=' + groups + ' leaves=' + leaves + ' source=ad_menu handAuthored=0');
    status('Menu: ' + groups + ' groups В· ' + leaves + ' items вҖ” folded from AD_Menu');
  }
  function renderNode(node) {
    var groups = 0, leaves = 0;
    var wrap = el('div', 'idmp-node');
    var isFolder = node.isSummary || (node.children && node.children.length);
    var row = el('div', 'idmp-row' + (isFolder ? '' : ' leaf'));
    row.dataset.name = (node.name || '').toLowerCase();
    var tw = el('span', 'tw', isFolder ? 'в–ё' : '');
    var ic = el('span', 'ic', isFolder ? 'рҹ“Ғ' : _actionGlyph(node.action));
    var nm = el('span', 'nm', node.name || ('#' + node.id));
    row.appendChild(tw); row.appendChild(ic); row.appendChild(nm);
    wrap.appendChild(row);
    if (isFolder) {
      groups++;
      var kids = el('div', 'idmp-children');
      (node.children || []).forEach(function (c) { var r = renderNode(c); kids.appendChild(r.dom); groups += r.groups; leaves += r.leaves; });
      wrap.appendChild(kids);
      row.addEventListener('click', function () { wrap.classList.toggle('open'); tw.textContent = wrap.classList.contains('open') ? 'в–ҫ' : 'в–ё'; });
    } else {
      leaves++;
      row.addEventListener('click', function () {
        document.querySelectorAll('.idmp-row.leaf.active').forEach(function (e) { e.classList.remove('active'); });
        row.classList.add('active');
        if (node.action === 'W' && node.windowId) openWindow(Number(node.windowId), node.name);
        else status('"' + node.name + '" вҖ” action ' + node.action + ' (window opening only in I1)');
        if (window.innerWidth <= 760) document.body.classList.remove('menu-open');
      });
    }
    return { dom: wrap, groups: groups, leaves: leaves };
  }
  function _actionGlyph(a) { return a === 'W' ? 'в–Ө' : a === 'R' ? 'в–Ұ' : a === 'P' ? 'в–ё' : a === 'F' ? 'в–Ў' : 'В·'; }

  // в”Җв”Җ Open a window (MDI tab + toolbar + AD tab-strip) в”Җв”Җ
  function openWindow(windowId, name) {
    if (!_openWins[windowId]) {
      var win = ADP.getWindow(db, windowId);
      if (!win) { status('Window ' + windowId + ' not found'); return; }
      _openWins[windowId] = { win: win, name: name || win.name };
      console.log('В§IDEMPIERE window=' + win.name + '(' + windowId + ') tabs=' + (win.tabs ? win.tabs.length : 0) + ' source=sqlite');
    }
    _activeWin = windowId; _activeTabIdx = 0; _viewMode = 'grid';
    renderWinTabs(); renderToolbar(); renderTabStrip(); renderActiveTab();
  }
  function closeWindow(windowId) {
    delete _openWins[windowId];
    var ids = Object.keys(_openWins);
    if (windowId === _activeWin) {
      if (ids.length) openWindow(Number(ids[ids.length - 1]));
      else { _activeWin = null; renderWinTabs(); $('idmp-toolbar').style.display = 'none'; $('idmp-tabstrip').style.display = 'none';
        $('idmp-content').innerHTML = '<div id="idmp-placeholder"><div class="big">&#128193;</div>Select a menu item to open a window.</div>'; status('Ready'); }
    } else renderWinTabs();
  }
  function renderWinTabs() {
    var bar = $('idmp-wintabs'); bar.innerHTML = '';
    Object.keys(_openWins).forEach(function (idStr) {
      var id = Number(idStr), o = _openWins[id];
      var t = el('div', 'idmp-wintab' + (id === _activeWin ? ' active' : ''));
      t.appendChild(el('span', 'lbl', o.name));
      var x = el('span', 'x', 'Г—');
      x.addEventListener('click', function (e) { e.stopPropagation(); closeWindow(id); });
      t.appendChild(x);
      t.addEventListener('click', function () { openWindow(id); });
      bar.appendChild(t);
    });
  }
  function _curWin() { return _activeWin != null ? _openWins[_activeWin].win : null; }
  function _curTab() { var w = _curWin(); return w && w.tabs ? w.tabs[_activeTabIdx] : null; }

  function renderToolbar() {
    var tb = $('idmp-toolbar'); tb.style.display = 'flex'; tb.innerHTML = '';
    function btn(label, title, enabled, fn) {
      var b = el('button', null); b.innerHTML = label; b.title = title;
      if (!enabled) b.disabled = true; else if (fn) b.addEventListener('click', fn);
      tb.appendChild(b); return b;
    }
    function sep() { tb.appendChild(el('span', 'sep')); }
    btn('вҹІ', 'Refresh', true, function () { renderActiveTab(); });
    sep();
    btn('пјӢ', 'New (arrives with CRUD-P)', false);
    btn('рҹ’ҫ', 'Save (arrives with CRUD-P)', false);
    btn('рҹ—‘', 'Delete (arrives with CRUD-P)', false);
    sep();
    btn('в—Җв—Җ', 'First record', true, function () { _recIdx = 0; refreshForm(); });
    btn('в—Җ', 'Previous record', true, function () { if (_recIdx > 0) _recIdx--; refreshForm(); });
    var navSpan = el('span', 'nav'); navSpan.id = 'idmp-recnav'; tb.appendChild(navSpan);
    btn('в–¶', 'Next record', true, function () { if (_recIdx < _records.length - 1) _recIdx++; refreshForm(); });
    btn('в–¶в–¶', 'Last record', true, function () { _recIdx = Math.max(0, _records.length - 1); refreshForm(); });
    sep();
    var tgl = btn('в–Ұ Grid', 'Toggle Grid / Form', true, function () {
      _viewMode = _viewMode === 'grid' ? 'form' : 'grid';
      tgl.innerHTML = _viewMode === 'grid' ? 'в–Ұ Grid' : 'в–Ө Form';
      renderBody();
    });
    tgl.innerHTML = _viewMode === 'grid' ? 'в–Ұ Grid' : 'в–Ө Form';
  }
  function renderTabStrip() {
    var w = _curWin(); var strip = $('idmp-tabstrip'); strip.style.display = 'flex'; strip.innerHTML = '';
    (w.tabs || []).forEach(function (tab, i) {
      var t = el('div', 'idmp-adtab' + (i === _activeTabIdx ? ' active' : ''), tab.name + (tab.tabLevel ? '' : ''));
      t.addEventListener('click', function () { _activeTabIdx = i; _viewMode = 'grid'; renderActiveTab(); renderTabStrip(); renderToolbar(); });
      strip.appendChild(t);
    });
  }

  // в”Җв”Җ Tab data + body render в”Җв”Җ
  function _tableExists(t) {
    try { var r = db.exec("SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND lower(name)=lower('" + t.replace(/'/g, "") + "') LIMIT 1"); return r.length > 0; }
    catch (e) { return true; }
  }
  function renderActiveTab() {
    var tab = _curTab(); if (!tab) return;
    if (!tab.tableName) { _records = []; _recIdx = 0; $('idmp-content').innerHTML = '<div id="idmp-placeholder">Tab has no table.</div>'; return; }
    // Honest: ad_seed.db carries AD metadata for ALL windows but DATA for a curated subset only.
    if (!_tableExists(tab.tableName)) {
      _records = []; _recIdx = 0;
      $('idmp-toolbar').style.display = 'flex'; renderToolbar();
      $('idmp-content').innerHTML = '<div id="idmp-placeholder"><div class="big">&#9707;</div>' +
        '<b>' + tab.name + '</b> renders ' + (tab.fields ? tab.fields.length : 0) + ' fields from AD metadata,<br>' +
        'but its table <code>' + tab.tableName + '</code> is not in this seed.<br>' +
        '<span style="font-size:12px">ad_seed.db carries the Application Dictionary for all ' +
        '370 windows + data for a GardenWorld subset вҖ” not invented.</span></div>';
      console.log('В§IDEMPIERE tab=' + tab.name + ' table=' + tab.tableName + ' rows=n/a(table-not-in-seed) fields=' + (tab.fields ? tab.fields.length : 0));
      status(_curWin().name + ' вҖә ' + tab.name + '  В·  table ' + tab.tableName + ' not in curated seed');
      return;
    }
    var where = tab.whereClause && tab.whereClause.indexOf('@') < 0 ? tab.whereClause : null; // skip context-var clauses in I1
    var orderBy = tab.orderByClause && tab.orderByClause.indexOf('@') < 0 ? tab.orderByClause : null;
    _records = ADD.readRecords(db, tab.tableName, where, orderBy) || [];
    if (_records.length > 200) _records = _records.slice(0, 200); // cap display in I1
    _recIdx = 0;
    console.log('В§IDEMPIERE tab=' + tab.name + ' table=' + tab.tableName + ' rows=' + _records.length + ' fields=' + (tab.fields ? tab.fields.length : 0));
    renderBody();
  }
  function _displayFields(tab) {
    return (tab.fields || []).filter(function (f) { return f.isDisplayed && !f.isKey; });
  }
  function recVal(rec, col) {
    if (!rec) return '';
    if (col in rec) return rec[col];
    var lc = col.toLowerCase();
    for (var k in rec) if (k.toLowerCase() === lc) return rec[k];
    return '';
  }
  function fmt(f, raw) {
    if (raw == null || raw === '') return '';
    var rt = f.referenceType;
    if (rt === 'yesno') return (raw === 'Y' || raw === true || raw === 1) ? 'вҳ‘' : 'вҳҗ';
    if (rt === 'tableDirect' || rt === 'table' || rt === 'search') {
      try { var n = ADD.resolveFK(db, f.columnName, raw); if (n) return n; } catch (e) {}
      return String(raw);
    }
    return String(raw);
  }
  function renderBody() {
    var tab = _curTab(); if (!tab) return;
    var host = $('idmp-content'); host.innerHTML = '';
    if (_viewMode === 'grid') host.appendChild(buildGrid(tab));
    else host.appendChild(buildForm(tab));
    updateStatus(tab);
    refreshForm();
  }
  function buildGrid(tab) {
    var cols = _displayFields(tab).slice(0, 7);
    var table = el('table', 'idmp-grid');
    var thead = el('thead'); var htr = el('tr');
    cols.forEach(function (f) { htr.appendChild(el('th', null, f.name)); });
    thead.appendChild(htr); table.appendChild(thead);
    var tb = el('tbody');
    if (!_records.length) { var tr = el('tr'); var td = el('td', null, 'No records'); td.colSpan = cols.length || 1; td.style.color = '#888'; tr.appendChild(td); tb.appendChild(tr); }
    _records.forEach(function (rec, i) {
      var tr = el('tr'); tr.dataset.i = i;
      cols.forEach(function (f) { tr.appendChild(el('td', null, fmt(f, recVal(rec, f.columnName)))); });
      tr.addEventListener('click', function () { _recIdx = i; _viewMode = 'form'; renderBody(); renderToolbar(); });
      tb.appendChild(tr);
    });
    table.appendChild(tb);
    return table;
  }
  function buildForm(tab) {
    var form = el('div', 'idmp-form'); form.id = 'idmp-form';
    var rec = _records[_recIdx];
    _displayFields(tab).forEach(function (f) {
      var fld = el('div', 'idmp-fld' + (f.isMandatory ? ' mand' : ''));
      fld.appendChild(el('label', null, f.name));
      var v = el('div', 'val' + (f.referenceType === 'yesno' ? ' bool' : ''), fmt(f, recVal(rec, f.columnName)));
      v.title = f.columnName + ' В· ' + f.referenceType;
      fld.appendChild(v);
      form.appendChild(fld);
    });
    return form;
  }
  function refreshForm() {
    var nav = $('idmp-recnav');
    if (nav) nav.textContent = _records.length ? ('Record ' + (_recIdx + 1) + ' of ' + _records.length) : '0 records';
    if (_viewMode === 'form') { var tab = _curTab(); if (tab) { $('idmp-content').innerHTML = ''; $('idmp-content').appendChild(buildForm(tab)); } }
    var t = _curTab(); if (t) updateStatus(t);
  }
  function updateStatus(tab) {
    var w = _curWin();
    status(w.name + ' вҖә ' + tab.name + (_records.length ? ('  В·  Record ' + (_recIdx + 1) + ' of ' + _records.length) : '  В·  0 records') + '  В·  ' + tab.tableName);
    $('idmp-status-src').textContent = 'folded from SQLite WASM (ad_seed.db)';
  }

  // в”Җв”Җ Menu filter в”Җв”Җ
  function applyFilter(q) {
    q = (q || '').trim().toLowerCase();
    document.querySelectorAll('#idmp-tree .idmp-node').forEach(function (node) {
      var row = node.querySelector(':scope > .idmp-row');
      var name = row ? (row.dataset.name || '') : '';
      var selfMatch = !q || name.indexOf(q) >= 0;
      var kidMatch = q && node.querySelector('.idmp-row') && Array.prototype.some.call(node.querySelectorAll('.idmp-row'), function (r) { return (r.dataset.name || '').indexOf(q) >= 0; });
      node.style.display = (selfMatch || kidMatch) ? '' : 'none';
      if (q && kidMatch) node.classList.add('open');
    });
  }

  // в”Җв”Җ Wire chrome в”Җв”Җ
  document.addEventListener('DOMContentLoaded', function () {
    $('idmp-menu-filter').addEventListener('input', function (e) { applyFilter(e.target.value); });
    $('idmp-search').addEventListener('input', function (e) { $('idmp-menu-filter').value = e.target.value; applyFilter(e.target.value); });
    $('idmp-burger').addEventListener('click', function () { document.body.classList.toggle('menu-open'); });
    $('idmp-home-btn').addEventListener('click', function () { location.href = 'erp.html'; });
    $('idmp-help-btn').addEventListener('click', function () { status('Help / ShowMe overlay вҖ” arrives once the UI is confirmed'); });
    boot().catch(function (e) { console.error('В§IDEMPIERE boot error: ' + e.message); $('idmp-load-msg').textContent = 'Boot error: ' + e.message; });
  });
})();
</script>
</body>
