<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIM OOTB — 2D Plans</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4fc3f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #ccc; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: rgba(20,20,40,0.95); border-bottom: 1px solid #333;
  display: flex; align-items: center; gap: 8px; padding: 6px 12px; flex-wrap: wrap;
}
#toolbar h1 { font-size: 14px; color: #4fc3f7; margin-right: 12px; white-space: nowrap; }
#toolbar select, #toolbar button {
  background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px;
  padding: 4px 10px; font-size: 12px; cursor: pointer;
}
#toolbar select:hover, #toolbar button:hover { background: #444; color: #fff; }
#toolbar button.active { background: #4fc3f7; color: #000; border-color: #4fc3f7; }
#layer-panel {
  position: fixed; top: 44px; right: 8px; z-index: 10;
  background: rgba(20,20,40,0.92); border: 1px solid #333; border-radius: 6px;
  padding: 8px; max-height: 60vh; overflow-y: auto; min-width: 160px; display: none;
}
#layer-panel h3 { font-size: 12px; color: #4fc3f7; margin-bottom: 6px; }
#layer-panel label { display: block; font-size: 11px; padding: 2px 0; cursor: pointer; }
#layer-panel label:hover { color: #fff; }
#info-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: rgba(20,20,40,0.95); border-top: 1px solid #333;
  padding: 4px 12px; font-size: 11px; display: flex; gap: 16px;
}
#info-bar .label { color: #888; }
#info-bar .value { color: #4fc3f7; }
canvas { display: block; }
#drop-zone {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100; background: rgba(0,0,0,0.7);
  justify-content: center; align-items: center; font-size: 24px; color: #4fc3f7;
}
</style>
</head>
<body>

<div id="toolbar">
  <h1 data-trl="ui_2d_title">2D Plans</h1>
  <select id="sheet-select"><option value="" data-trl="ui_2d_select">— select sheet —</option></select>
  <span id="bld-btns" style="display:flex;gap:4px">
    <button id="bld-sh-btn" class="active" onclick="loadBuilding('SH')">SH</button>
    <button id="bld-dx-btn" onclick="loadBuilding('DX')">DX</button>
  </span>
  <button id="layers-btn" onclick="toggleLayers()" data-trl="ui_2d_layers">Layers</button>
  <button id="fit-btn" onclick="fitView()" data-trl="ui_2d_fit">Fit</button>
  <button id="bimsrc-btn" onclick="toggleBimsrc()" title="Toggle BIMSRC highlight">BIMSRC</button>
  <span style="border-left:1px solid #555;height:20px;margin:0 4px"></span>
  <select id="view-mode" title="View mode">
    <option value="plan" data-trl="ui_2d_floor_plan">Floor Plan</option>
    <option value="front" data-trl="ui_2d_front_elev">Front Elev</option>
    <option value="rear" data-trl="ui_2d_rear_elev">Rear Elev</option>
    <option value="left" data-trl="ui_2d_left_elev">Left Elev</option>
    <option value="right" data-trl="ui_2d_right_elev">Right Elev</option>
  </select>
  <select id="storey-select" title="Storey"><option value="" data-trl="ui_2d_storey_opt">— storey —</option></select>
  <button id="gen-btn" onclick="generateFromDb()" data-trl="ui_2d_generate">Generate</button>
  <button id="export-btn" onclick="exportDxf()" data-trl-title="ui_tt_export" data-trl="ui_2d_export_dxf" title="Export DXF">Export DXF</button>
  <span style="flex:1"></span>
  <span id="status-text" style="font-size:11px;color:#888"></span>
  <button id="header-flag-btn" onclick="window._TRL_LOADER&&_TRL_LOADER.openFlagPicker()" title="Change locale" style="font-size:16px;padding:2px 6px">&#127760;</button>
  <button onclick="location.href='/'" title="Home" style="font-size:16px;padding:2px 6px">&#127968;</button>
</div>

<div id="layer-panel"><h3 data-trl="ui_2d_layers">Layers</h3><div id="layer-list"></div></div>

<canvas id="canvas"></canvas>

<div id="info-bar">
  <span><span class="label" data-trl="ui_2d_entities_lbl">Entities: </span><span class="value" id="ent-count">0</span></span>
  <span><span class="label" data-trl="ui_2d_layers_lbl">Layers: </span><span class="value" id="layer-count">0</span></span>
  <span id="bimsrc-info" style="display:none">
    <span class="label" data-trl="ui_2d_class_lbl">Class: </span><span class="value" id="bi-class">—</span>
    <span class="label" style="margin-left:8px" data-trl="ui_2d_name_lbl">Name: </span><span class="value" id="bi-name">—</span>
    <span class="label" style="margin-left:8px" data-trl="ui_2d_storey_lbl">Storey: </span><span class="value" id="bi-storey">—</span>
  </span>
</div>

<div id="drop-zone" data-trl="ui_2d_drop">Drop DXF file here</div>

<script src="section_cut.js?v=4"></script>
<script src="grid_dims.js?v=4"></script>
<script src="title_block.js?v=1"></script>

<script>
// ─── State ───
let dxf = null;           // parsed DXF object
let entities = [];         // dxf.entities
let layerVisibility = {};  // layer name → boolean
let showBimsrc = false;

// View transform
let viewX = 0, viewY = 0, viewScale = 1;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ─── Sheet manifest ───
// Available pre-generated DXF sheets (SH and DX only)
// Each entry: [prefix, display name, dxf path]
const ALL_SHEETS = [
  ['SH', 'Floor Plan',    'dxf/SH_FLOOR.dxf'],
  ['SH', 'Front Elev',    'dxf/SH_FRONT.dxf'],
  ['SH', 'Rear Elev',     'dxf/SH_REAR.dxf'],
  ['SH', 'Left Elev',     'dxf/SH_LEFT.dxf'],
  ['SH', 'Right Elev',    'dxf/SH_RIGHT.dxf'],
  ['SH', 'Roof Plan',     'dxf/SH_ROOF.dxf'],
  ['DX', 'Floor (GF)',    'dxf/DX_FLOOR_GF.dxf'],
  ['DX', 'Floor (FF)',    'dxf/DX_FLOOR_FF.dxf'],
  ['DX', 'Front Elev',    'dxf/DX_FRONT.dxf'],
  ['DX', 'Rear Elev',     'dxf/DX_REAR.dxf'],
  ['DX', 'Left Elev',     'dxf/DX_LEFT.dxf'],
  ['DX', 'Right Elev',    'dxf/DX_RIGHT.dxf'],
  ['DX', 'Roof Plan',     'dxf/DX_ROOF.dxf'],
  ['DX', 'Plumbing',      'dxf/DX_PLUMBING.dxf'],
];

// Resolve params
const params = new URLSearchParams(location.search);
const bldParam = (params.get('bld') || '').toLowerCase();
const hasDbParam = !!params.get('db');
console.log('§2D_INIT url=' + location.href);
console.log('§2D_INIT params: db=' + (params.get('db')||'(none)') +
            ' lib=' + (params.get('lib')||'(none)') +
            ' bld=' + (params.get('bld')||'(none)') +
            ' hasDbParam=' + hasDbParam);

// Building prefix only matters for legacy DXF file lookup
let prefix = '';
if (!hasDbParam) {
  if (bldParam.includes('sample') || bldParam.includes('sh_') || bldParam === 'sh') prefix = 'SH';
  else if (bldParam.includes('duplex') || bldParam.includes('dx_') || bldParam === 'dx') prefix = 'DX';
  if (!prefix) {
    const dbLower = (params.get('db') || '').toLowerCase();
    if (dbLower.includes('sample') || dbLower.includes('_sh')) prefix = 'SH';
    else if (dbLower.includes('duplex') || dbLower.includes('_dx')) prefix = 'DX';
  }
}
console.log('§2D_INIT mode=' + (hasDbParam ? 'DYNAMIC (from DB)' : 'DXF_FILES') +
            ' prefix=' + (prefix || '(none)'));

// Filter sheets to active building (or show all if no match)
const sheets = prefix ? ALL_SHEETS.filter(s => s[0] === prefix) : ALL_SHEETS;

// Populate sheet selector (only in DXF-file mode)
const sel = document.getElementById('sheet-select');
if (hasDbParam) {
  sel.style.display = 'none';  // hide DXF sheet dropdown in DB mode
  // bld-btns remain visible — user can switch inline baseline while DB loads
} else {
  // Default: SH sheets (will be replaced by loadBuilding)
  const initSheets = prefix ? ALL_SHEETS.filter(s => s[0] === prefix) : ALL_SHEETS.filter(s => s[0] === 'SH');
  initSheets.forEach(([pfx, name, url]) => {
    const opt = document.createElement('option');
    opt.value = url; opt.textContent = name;
    sel.appendChild(opt);
  });
}
sel.addEventListener('change', () => { if (sel.value) loadDxfUrl(sel.value); });

// ─── Building toggle (DXF-file mode only) ───
const BLD_DEFAULT = { SH: 'dxf/SH_FLOOR.dxf', DX: 'dxf/DX_FLOOR_GF.dxf' };
function loadBuilding(bld) {
  document.getElementById('bld-sh-btn').classList.toggle('active', bld === 'SH');
  document.getElementById('bld-dx-btn').classList.toggle('active', bld === 'DX');
  const url = BLD_DEFAULT[bld];
  const bldSheets = ALL_SHEETS.filter(s => s[0] === bld);
  // Repopulate sheet dropdown for this building
  sel.innerHTML = '';
  bldSheets.forEach(([pfx, name, u]) => {
    const opt = document.createElement('option');
    opt.value = u; opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.value = url;
  // Use inline DXF if available (renders without fetch — survives missing OCI files)
  if (typeof DXF_INLINE !== 'undefined' && DXF_INLINE[bld]) {
    window._structBbox = null;  // DXF coords are mm, not world metres — use entity bbox
    console.log('§2D_INLINE using embedded DXF for ' + bld);
    parseDxf(DXF_INLINE[bld]);
  } else {
    loadDxfUrl(url);
  }
}

// ─── DXF Loading ───
async function loadDxfUrl(url) {
  setStatus((typeof _TRL!=='undefined'&&_TRL.ui_2d_loading||'Loading {url}...').replace('{url}',url));
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
    const text = await resp.text();
    parseDxf(text);
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
}

function parseDxf(text) {
  const parser = new DxfParser();
  try {
    dxf = parser.parseSync(text);
  } catch (e) {
    setStatus('Parse error: ' + e.message);
    return;
  }
  window.dxf = dxf;
  entities = dxf.entities || [];
  // Build layer list
  layerVisibility = {};
  const layers = new Set();
  entities.forEach(e => { if (e.layer) layers.add(e.layer); });
  layers.forEach(l => { layerVisibility[l] = true; });
  buildLayerPanel();
  document.getElementById('ent-count').textContent = entities.length;
  document.getElementById('layer-count').textContent = layers.size;
  setStatus((typeof _TRL!=='undefined'&&_TRL.ui_2d_loaded||'Loaded: {n} entities, {l} layers').replace('{n}',entities.length).replace('{l}',layers.size));
  fitView();
}

// ─── Layer Panel ───
function buildLayerPanel() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  const sorted = Object.keys(layerVisibility).sort();
  sorted.forEach(name => {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = true;
    cb.addEventListener('change', () => { layerVisibility[name] = cb.checked; draw(); });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(' ' + name));
    list.appendChild(label);
  });
}

function toggleLayers() {
  const p = document.getElementById('layer-panel');
  const vis = getComputedStyle(p).display;
  p.style.display = vis === 'none' ? 'block' : 'none';
}

// ─── View Transform ───
// DXF coords → screen coords
function toScreen(x, y) {
  return [
    (x - viewX) * viewScale + canvas.width / 2,
    canvas.height / 2 - (y - viewY) * viewScale   // Y-flip: DXF Y-up → screen Y-down
  ];
}

// Layers that should NOT drive the zoom — they extend outside the building
const NON_STRUCT_LAYERS = new Set(['A-GRID','A-ANNO-DIMS','A-ANNO-TEXT','A-ELEV-LEVL']);

function fitView() {
  if (!entities.length) return;

  // Use stored structure bbox if available (DB-generated plans).
  // This keeps grid/dims/bubbles in frame with a generous margin, building centred.
  if (window._structBbox && isFinite(window._structBbox.minX)) {
    const s = window._structBbox;
    const w = s.maxX - s.minX || 1, h = s.maxY - s.minY || 1;
    // Add 20% padding each side to show grid bubbles + dim lines outside building
    const padX = Math.max(w * 0.20, 3), padY = Math.max(h * 0.20, 3);
    const fw = w + padX * 2, fh = h + padY * 2;
    viewScale = Math.min((canvas.width - 40) / fw, (canvas.height - 40) / fh);
    viewX = (s.minX + s.maxX) / 2;
    viewY = (s.minY + s.maxY) / 2;
    window.viewScale = viewScale;
    console.log('§2D_FITVIEW struct=[' + s.minX.toFixed(2) + ',' + s.minY.toFixed(2) +
                ' to ' + s.maxX.toFixed(2) + ',' + s.maxY.toFixed(2) +
                '] pad=' + padX.toFixed(2) + ' scale=' + viewScale.toFixed(4));
    draw();
    return;
  }

  // Fallback: bbox from structural entity vertices only (skip grid/anno)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  entities.forEach(e => {
    if (NON_STRUCT_LAYERS.has(e.layer)) return;
    const pts = getEntityPoints(e);
    pts.forEach(p => {
      if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
      if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
    });
  });
  // If nothing structural, fall back to all entities
  if (!isFinite(minX)) {
    entities.forEach(e => {
      getEntityPoints(e).forEach(p => {
        if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
      });
    });
  }
  if (!isFinite(minX)) {
    console.warn('§2D_FITVIEW no finite points — entities=' + entities.length);
    return;
  }
  const dxfW = maxX - minX || 1, dxfH = maxY - minY || 1;
  const margin = 40;
  viewScale = Math.min((canvas.width - margin * 2) / dxfW, (canvas.height - margin * 2) / dxfH);
  viewX = (minX + maxX) / 2;
  viewY = (minY + maxY) / 2;
  window.viewScale = viewScale;
  console.log('§2D_FITVIEW bbox=[' + minX.toFixed(2) + ',' + minY.toFixed(2) + ' to ' +
              maxX.toFixed(2) + ',' + maxY.toFixed(2) + '] scale=' + viewScale.toFixed(4) +
              ' canvas=' + canvas.width + 'x' + canvas.height);
  draw();
}

// Get bounding points from an entity (for fit-view)
function getEntityPoints(e) {
  const pts = [];
  if (e.vertices) e.vertices.forEach(v => pts.push(v));
  if (e.center) pts.push(e.center);
  if (e.startPoint) pts.push(e.startPoint);
  if (e.endPoint) pts.push(e.endPoint);
  if (e.position) pts.push(e.position);
  if (e.points) e.points.forEach(p => pts.push(p));
  if (e.controlPoints) e.controlPoints.forEach(p => pts.push(p));
  return pts;
}

// ─── Layer Colors — dark-bg palette ───
// Walls: bright white/grey hierarchy. Grid: muted blue-grey. Dims: blue tint. Doors/glaz: cyan tint.
const LAYER_COLORS = {
  'A-WALL-FULL': '#ffffff',   // structural walls — white, prominent
  'A-WALL-PRTN': '#cccccc',   // partitions — lighter grey
  'A-WALL-CORE': '#dddddd',   // core/shear walls
  'A-GLAZ':      '#66aadd',   // glazing/curtain wall — blue
  'A-DOOR':      '#88ccdd',   // doors — cyan tint
  'A-COLM':      '#eeeeee',   // columns — near-white
  'A-STAIR':     '#aabbcc',   // stairs
  'A-RAIL':      '#889999',   // railings
  'A-SLAB':      '#888888',   // slabs/floors (cut cross-section)
  'A-ROOF':      '#bbbbbb',   // roof
  'A-FURN':      '#556677',   // furniture — dark blue-grey, recede
  'A-GRID':      '#556688',   // grid lines — muted blue-grey
  'A-ANNO-DIMS': '#99aacc',   // dimension lines — blue-grey
  'A-ANNO-TEXT': '#aabbcc',   // annotation text
  'A-ELEV-WALL': '#ffffff',
  'A-ELEV-LEVL': '#99aacc',
  'A-TTLB':      '#557799',   // title block border — blue-grey
  'A-WALL-PATT': '#999999',   // wall section hatch fill — medium grey solid
  'A-ANNO-SECT': '#66aadd',   // section cut markers — cyan-blue
};

function layerColor(layer) {
  return LAYER_COLORS[layer] || '#888899';
}

const LAYER_WEIGHTS = {
  'A-WALL-FULL': 2.5, 'A-WALL-PRTN': 1.5, 'A-WALL-CORE': 2.0,
  'A-GLAZ': 1.0, 'A-DOOR': 1.0, 'A-COLM': 2.5, 'A-STAIR': 1.2, 'A-RAIL': 0.8,
  'A-SLAB': 1.5, 'A-ROOF': 2.0, 'A-FURN': 0.6,
  'A-GRID': 0.6, 'A-ANNO-DIMS': 0.6, 'A-ANNO-TEXT': 0.6,
  'A-ELEV-WALL': 2.5, 'A-ELEV-LEVL': 0.8,
};

function layerWeight(layer) {
  return LAYER_WEIGHTS[layer] || 1.0;
}

// ─── Drawing ───
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!entities.length) return;

  // Draw entities by layer order (background layers first)
  const layerOrder = ['A-WALL-PATT', 'A-FURN', 'A-GRID', 'A-ANNO-DIMS', 'A-ANNO-SECT', 'A-ANNO-TEXT', 'A-ELEV-LEVL',
                      'A-GLAZ', 'A-DOOR', 'A-WALL-PRTN', 'A-WALL-FULL', 'A-ROOF', 'A-ELEV-WALL'];
  // Group entities by layer
  const byLayer = {};
  entities.forEach(e => {
    const l = e.layer || '0';
    if (!byLayer[l]) byLayer[l] = [];
    byLayer[l].push(e);
  });

  // Draw known layers in order, then any remaining
  const drawn = new Set();
  layerOrder.forEach(l => {
    if (byLayer[l] && layerVisibility[l] !== false) {
      byLayer[l].forEach(e => drawEntity(e));
      drawn.add(l);
    }
  });
  Object.keys(byLayer).forEach(l => {
    if (!drawn.has(l) && layerVisibility[l] !== false) {
      byLayer[l].forEach(e => drawEntity(e));
    }
  });
}

function drawEntity(e) {
  const color = layerColor(e.layer);
  const weight = layerWeight(e.layer);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = Math.max(0.5, weight * Math.min(viewScale / 5, 1.5));
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // BIMSRC highlight
  if (showBimsrc && hasBimsrc(e)) {
    ctx.strokeStyle = '#44cc44';
    ctx.lineWidth = Math.max(1.5, weight * 2);
  }

  switch (e.type) {
    case 'LINE': drawLine(e); break;
    case 'LWPOLYLINE': case 'POLYLINE': drawPolyline(e); break;
    case 'CIRCLE': drawCircle(e); break;
    case 'ARC': drawArc(e); break;
    case 'TEXT': case 'MTEXT': drawText(e); break;
    case 'POINT': drawPoint(e); break;
    case 'SOLID': case '3DFACE': drawSolid(e); break;
    case 'INSERT': drawInsert(e); break;
    case 'ELLIPSE': drawEllipse(e); break;
    case 'SPLINE': drawSpline(e); break;
    case 'DIMENSION': drawDimension(e); break;
  }
}

function drawLine(e) {
  if (!e.vertices || e.vertices.length < 2) return;
  const [x1, y1] = toScreen(e.vertices[0].x, e.vertices[0].y);
  const [x2, y2] = toScreen(e.vertices[1].x, e.vertices[1].y);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawPolyline(e) {
  if (!e.vertices || e.vertices.length < 2) return;
  ctx.beginPath();
  const [x0, y0] = toScreen(e.vertices[0].x, e.vertices[0].y);
  ctx.moveTo(x0, y0);
  for (let i = 1; i < e.vertices.length; i++) {
    const v = e.vertices[i];
    if (e.vertices[i - 1].bulge) {
      drawBulgeSegment(e.vertices[i - 1], v, e.vertices[i - 1].bulge);
    } else {
      const [x, y] = toScreen(v.x, v.y);
      ctx.lineTo(x, y);
    }
  }
  if (e.shape) {
    const last = e.vertices[e.vertices.length - 1];
    if (last.bulge) {
      drawBulgeSegment(last, e.vertices[0], last.bulge);
    } else {
      ctx.closePath();
    }
  }
  if (e.fill) {
    ctx.globalAlpha = e.fillAlpha !== undefined ? e.fillAlpha : 0.7;
    ctx.fill();
    ctx.globalAlpha = 1.0;
  }
  ctx.stroke();
}

function drawBulgeSegment(v1, v2, bulge) {
  // Bulge = tan(angle/4). Convert to arc.
  const dx = v2.x - v1.x, dy = v2.y - v1.y;
  const chord = Math.sqrt(dx * dx + dy * dy);
  if (chord < 1e-10) return;
  const s = bulge * chord / 2;
  const r = (chord * chord / 4 + s * s) / (2 * Math.abs(s));
  const angle = 4 * Math.atan(Math.abs(bulge));
  const midX = (v1.x + v2.x) / 2, midY = (v1.y + v2.y) / 2;
  const d = Math.sqrt(r * r - chord * chord / 4);
  const sign = bulge > 0 ? 1 : -1;
  const cx = midX - sign * d * dy / chord;
  const cy = midY + sign * d * dx / chord;
  const startAngle = Math.atan2(v1.y - cy, v1.x - cx);
  const endAngle = Math.atan2(v2.y - cy, v2.x - cx);
  const [sx, sy] = toScreen(cx, cy);
  const sr = r * viewScale;
  ctx.arc(sx, sy, sr, -startAngle, -endAngle, bulge > 0);
}

function drawCircle(e) {
  if (!e.center) return;
  const [cx, cy] = toScreen(e.center.x, e.center.y);
  // screenR flag: bubble radius is in screen px — do NOT multiply by viewScale
  const r = e.screenR ? e.radius : e.radius * viewScale;
  if (r < 1) return;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
}

function drawArc(e) {
  if (!e.center) return;
  const [cx, cy] = toScreen(e.center.x, e.center.y);
  const r = e.radius * viewScale;
  // DXF angles are CCW from +X; canvas Y is flipped so negate angles
  ctx.beginPath(); ctx.arc(cx, cy, r, -e.startAngle, -e.endAngle, true); ctx.stroke();
}

function drawEllipse(e) {
  if (!e.center || !e.majorAxisEndPoint) return;
  const [cx, cy] = toScreen(e.center.x, e.center.y);
  const mx = e.majorAxisEndPoint.x, my = e.majorAxisEndPoint.y;
  const majorR = Math.sqrt(mx * mx + my * my) * viewScale;
  const minorR = majorR * (e.axisRatio || 1);
  const rot = -Math.atan2(my, mx);
  ctx.beginPath();
  ctx.ellipse(cx, cy, majorR, minorR, rot, -(e.startAngle || 0), -(e.endAngle || Math.PI * 2), true);
  ctx.stroke();
}

function drawText(e) {
  const pos = e.startPoint || e.position || e.endPoint;
  if (!pos) return;
  const [x, y] = toScreen(pos.x, pos.y);
  // screenH flag: font size is in screen px — do NOT multiply by viewScale
  const h = e.screenH ? (e.textHeight || e.height || 10) : (e.textHeight || e.height || 2.5) * viewScale;
  if (h < 4) return; // too small to read
  const text = e.text || '';
  const clean = text.replace(/\\[A-Za-z][^;]*;/g, '').replace(/\{|\}/g, '').replace(/\\P/g, '\n');
  ctx.font = Math.max(6, Math.min(h, 40)) + 'px monospace';
  ctx.textBaseline = 'middle';
  ctx.textAlign = e.align === 'center' ? 'center' : 'left';
  ctx.fillText(clean, x, y);
  ctx.textAlign = 'left'; // reset
}

function drawPoint(e) {
  if (!e.position) return;
  const [x, y] = toScreen(e.position.x, e.position.y);
  ctx.fillRect(x - 1, y - 1, 3, 3);
}

function drawSolid(e) {
  if (!e.points || e.points.length < 3) return;
  ctx.beginPath();
  const [x0, y0] = toScreen(e.points[0].x, e.points[0].y);
  ctx.moveTo(x0, y0);
  for (let i = 1; i < e.points.length; i++) {
    const [x, y] = toScreen(e.points[i].x, e.points[i].y);
    ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.globalAlpha = 0.4; ctx.fill(); ctx.globalAlpha = 1.0; ctx.stroke();
}

function drawInsert(e) {
  // Block inserts — draw as marker if block not resolved
  if (!e.position) return;
  const [x, y] = toScreen(e.position.x, e.position.y);
  ctx.strokeStyle = '#cccc44';
  ctx.strokeRect(x - 3, y - 3, 6, 6);
}

function drawSpline(e) {
  const pts = e.controlPoints || e.fitPoints;
  if (!pts || pts.length < 2) return;
  ctx.beginPath();
  const [x0, y0] = toScreen(pts[0].x, pts[0].y);
  ctx.moveTo(x0, y0);
  for (let i = 1; i < pts.length; i++) {
    const [x, y] = toScreen(pts[i].x, pts[i].y);
    ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawDimension(e) {
  // Draw dimension text at midpoint if available
  if (e.middleOfText) {
    const [x, y] = toScreen(e.middleOfText.x, e.middleOfText.y);
    const txt = e.text || (e.actualMeasurement ? e.actualMeasurement.toFixed(0) : '');
    if (txt) {
      ctx.font = Math.max(6, 10) + 'px monospace';
      ctx.fillText(txt, x, y);
    }
  }
}

// ─── BIMSRC ───
function hasBimsrc(e) {
  const xd = e.extendedData || e.xdata || e.xData;
  if (!xd) return false;
  return xd.applicationName === 'BIMSRC' || (xd.BIMSRC != null);
}

function getBimsrc(e) {
  const xd = e.extendedData || e.xdata || e.xData;
  if (!xd || !xd.customStrings) return null;
  const result = {};
  xd.customStrings.forEach(s => {
    const idx = s.indexOf(':');
    if (idx > 0) result[s.slice(0, idx)] = s.slice(idx + 1);
  });
  return result;
}

function toggleBimsrc() {
  showBimsrc = !showBimsrc;
  document.getElementById('bimsrc-btn').classList.toggle('active', showBimsrc);
  document.getElementById('bimsrc-info').style.display = showBimsrc ? 'inline' : 'none';
  draw();
}

// ─── Click → BIMSRC info ───
canvas.addEventListener('click', e => {
  if (!showBimsrc || !entities.length) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let closest = null, closestDist = 20; // 20px threshold
  entities.forEach(ent => {
    if (!hasBimsrc(ent)) return;
    if (ent.layer && layerVisibility[ent.layer] === false) return;
    const pts = getEntityPoints(ent);
    pts.forEach(p => {
      const [sx, sy] = toScreen(p.x, p.y);
      const d = Math.sqrt((sx - mx) ** 2 + (sy - my) ** 2);
      if (d < closestDist) { closestDist = d; closest = ent; }
    });
  });
  if (closest) {
    const info = getBimsrc(closest);
    if (info) {
      document.getElementById('bi-class').textContent = info.ifc_class || '—';
      document.getElementById('bi-name').textContent = info.element_name || '—';
      document.getElementById('bi-storey').textContent = info.storey || '—';
    }
  }
});

// ─── Pan & Zoom ───
let isDragging = false, dragStartX = 0, dragStartY = 0, dragViewX = 0, dragViewY = 0;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragViewX = viewX; dragViewY = viewY;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  viewX = dragViewX - dx / viewScale;
  viewY = dragViewY + dy / viewScale;  // Y-flip
  draw();
});

canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'crosshair'; });
canvas.addEventListener('mouseleave', () => { isDragging = false; canvas.style.cursor = 'crosshair'; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  // Zoom towards mouse position
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wx = viewX + (mx - canvas.width / 2) / viewScale;
  const wy = viewY - (my - canvas.height / 2) / viewScale;
  viewScale *= factor;
  viewX = wx - (mx - canvas.width / 2) / viewScale;
  viewY = wy + (my - canvas.height / 2) / viewScale;
  draw();
}, { passive: false });

document.addEventListener('dragover', e => {

document.addEventListener('dragleave', e => {

document.addEventListener('drop', e => {

});

// ─── IFC class → layer mapping — extracted from class, not invented ───
const IFC_LAYER = {
  'IfcWall':             'A-WALL-FULL',
  'IfcWallStandardCase': 'A-WALL-FULL',
  'IfcColumn':           'A-COLM',
  'IfcDoor':             'A-DOOR',

// ─── Load DBs from URL params ───
async function loadDatabases() {
  const dbParam = params.get('db');
  if (!dbParam) {
    console.log('§2D_DB no db= param, dynamic generation disabled');
    return;
  }
  setStatus(typeof _TRL!=='undefined'&&_TRL.ui_2d_load_dbs||'Loading databases...');
  try {
    // Load sql-wasm.js dynamically (only when DB params present — avoids blocking page load)
    if (typeof initSqlJs === 'undefined') {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'lib/sql-wasm.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load sql-wasm.js'));
        document.head.appendChild(s);
      });
      console.log('§2D_DB sql-wasm.js loaded dynamically');
    }
    const SQL = await initSqlJs({ locateFile: f => 'lib/' + f });

    // S243 §3.8: IndexedDB cache for offline support
    async function _2d_fetchDbBuffer(url) {
      var cacheDb = await new Promise(function(resolve) {
        var req = indexedDB.open('bim_ootb_cache', 1);
        req.onupgradeneeded = function() { req.result.createObjectStore('dbs'); };
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { resolve(null); };
      });
      if (cacheDb) {
        try {
          var cached = await new Promise(function(ok, fail) {
            var tx = cacheDb.transaction('dbs', 'readonly');
            var req = tx.objectStore('dbs').get(url);
            req.onsuccess = function() { ok(req.result); };
            req.onerror = function() { fail(); };
          });
          if (cached) { console.log('§2D_CACHE_HIT ' + url); return cached; }
        } catch(e) {}
      }
      var resp = await fetch(url);
      if (!resp.ok) throw new Error('DB fetch ' + resp.status);
      var buf = await resp.arrayBuffer();
      if (cacheDb) {
        try {
          var tx = cacheDb.transaction('dbs', 'readwrite');
          tx.objectStore('dbs').put(buf, url);
        } catch(e) {}
      }
      return buf;
    }

    const dbBuf = await _2d_fetchDbBuffer(dbParam);
    dbMain = new SQL.Database(new Uint8Array(dbBuf));
    console.log('§2D_DB main loaded from ' + dbParam);

    const libParam = params.get('lib');
    if (libParam) {
      const libBuf = await _2d_fetchDbBuffer(libParam);
      dbLib = new SQL.Database(new Uint8Array(libBuf));
      console.log('§2D_DB lib loaded from ' + libParam);
    } else {
      dbLib = dbMain;
      console.log('§2D_DB lib=main (no lib= param)');
    }

    dbReady = true;
    // Expose for white-box Playwright testing
    window._2d_dbMain = dbMain;
    window._2d_dbLib = dbLib;

    // Populate storey selector
    if (window.SectionCut) {
      const storeys = SectionCut.detectStoreys(dbMain);
      const stSel = document.getElementById('storey-select');
      storeys.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name + ' (z=' + s.floorZ.toFixed(1) + ')';
        stSel.appendChild(opt);
      });
      // Auto-select: skip foundation/roof/site — pick first real floor storey
      // Covers English (FDN, FOUNDATION, BASEMENT, ROOF, SITE) + Dutch (fundering, dak)
      const SKIP_PAT = /\bFDN\b|FOUND|FUNDER|BSMT|BASEMENT|ROOF|\bDAK\b|SITE|PARK|\bUNKNOWN\b/i;
      const floorStorey = storeys.find(s => !SKIP_PAT.test(s.name));
      const defaultStorey = floorStorey || storeys[0];
      if (defaultStorey) stSel.value = defaultStorey.name;
      const skipped = storeys.filter(s => SKIP_PAT.test(s.name)).map(s => s.name);
      const allNames = storeys.map(s => s.name + '(z=' + s.floorZ.toFixed(2) + ')').join(', ');
      console.log('§2D_STOREYS count=' + storeys.length +
                  ' default=' + (defaultStorey ? defaultStorey.name : 'none') +
                  ' skipped=' + skipped.join(','));
      console.log('§2D_STOREYS_ALL ' + allNames);
    }

    setStatus(typeof _TRL!=='undefined'&&_TRL.ui_2d_dbs_ready||'DBs loaded — generating...');
    // Auto-generate on load
    setTimeout(() => generateFromDb(), 100);
  } catch (e) {
    console.error('§2D_DB_ERROR', e);
    setStatus('DB load error: ' + e.message);
  }
}

// Layers that get a solid hatch fill on A-WALL-PATT (drawn before outline by layerOrder)
const WALL_FILL_LAYERS = new Set(['A-WALL-FULL', 'A-WALL-PRTN', 'A-WALL-CORE', 'A-COLM']);

// ─── Convert section cut results → DXF-like entities for the existing renderer ───
function sectionToEntities(elements) {
  const fills = [];   // drawn first (behind) on A-WALL-PATT
  const outlines = [];
  let hatchCount = 0;
  for (const el of elements) {
    if (el.category !== 'CUT' || !el.contours || el.contours.length === 0) continue;
    const layer = IFC_LAYER[el.ifcClass] || 'A-WALL-PRTN';
    for (const contour of el.contours) {
      if (contour.points.length < 3) continue;
      const verts = contour.points.map(p => ({ x: p[0], y: p[1] }));
      // Hatch fill — same contour, fill layer, no BIMSRC needed
      if (WALL_FILL_LAYERS.has(layer)) {
        fills.push({ type: 'LWPOLYLINE', vertices: verts, shape: true, layer: 'A-WALL-PATT', fill: true, fillAlpha: 0.7 });
        console.log('§RENDER HATCH layer=A-WALL-PATT src=guid:' + el.guid.substring(0, 8) + ' pts=' + verts.length);
        hatchCount++;
      }
      // Outline
      outlines.push({
        type: 'LWPOLYLINE',
        vertices: verts,
        shape: true,
        layer: layer,
        extendedData: {
          applicationName: 'BIMSRC',
          customStrings: [
            'guid:' + el.guid,
            'ifc_class:' + el.ifcClass,
            'element_name:' + (el.elementName || ''),
            'storey:' + (el.storey || ''),
          ]
        }
      });
    }
  }
  const out = fills.concat(outlines);
  console.log('§2D_GEN sectionToEntities=' + out.length + ' hatches=' + hatchCount + ' outlines=' + outlines.length);
  return out;
}

// ─── Annotation density config: localStorage → OCI remote → built-in defaults ───
// Key: 'bim2d_anno_config'. No install needed — just browse and it works.
// See docs/2D_HTML_GUIDE.md §6 for field descriptions.
const ANNO_CONFIG_DEFAULTS = {
  furnDetailRooms:    1,    // rooms with individual furniture outlines (largest first)
  maxFurnPerRoom:     12,   // cap per detailed room
  seatingThreshold:   8,    // cluster items >= this → assembly hall treatment
  seatingPattern:     'chair|seat|bench|stall|auditorium|theatre|stadium',
  hallAreaThresholdM2: 50,  // cluster bbox area >= this + seating → hall
  maxDoorTags:        20,   // D-tag cap (POC limit for large buildings)
  maxWindowTags:      20,   // W-tag cap
};
// OCI remote config — fetched once per session and cached in memory.
// If OCI is unreachable, falls through to built-in defaults (graceful).
const ANNO_CONFIG_OCI_URL = 'https://objectstorage.ap-kulai-2.oraclecloud.com/n/ax3cp6tzwuy2/b/bim-ootb/o/config%2F2d_anno_config.json';
let _annoConfigCache = null;

async function getAnnoConfig() {
  if (_annoConfigCache) return _annoConfigCache;
  // 1. localStorage
  try {
    const stored = localStorage.getItem('bim2d_anno_config');
    if (stored) {
      const cfg = JSON.parse(stored);
      _annoConfigCache = Object.assign({}, ANNO_CONFIG_DEFAULTS, cfg);
      console.log('§ANNO_CFG source=localStorage furnDetailRooms=' + _annoConfigCache.furnDetailRooms +
                  ' maxDoorTags=' + _annoConfigCache.maxDoorTags);
      return _annoConfigCache;
    }
  } catch(e) { /* malformed JSON — fall through */ }
  // 2. OCI remote (non-blocking, 3s timeout)
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch(ANNO_CONFIG_OCI_URL, { signal: ctrl.signal });
    clearTimeout(tid);
    if (r.ok) {
      const cfg = await r.json();
      _annoConfigCache = Object.assign({}, ANNO_CONFIG_DEFAULTS, cfg);
      console.log('§ANNO_CFG source=OCI furnDetailRooms=' + _annoConfigCache.furnDetailRooms);
      return _annoConfigCache;
    }
  } catch(e) { /* OCI unreachable — use defaults */ }
  // 3. Built-in defaults
  _annoConfigCache = Object.assign({}, ANNO_CONFIG_DEFAULTS);
  console.log('§ANNO_CFG source=defaults furnDetailRooms=' + _annoConfigCache.furnDetailRooms);
  return _annoConfigCache;
}

// ─── Furniture outlines, room labels, door/window tags, section cut marker ───
// Density-controlled by annotation config (see getAnnoConfig / ANNO_CONFIG_DEFAULTS).
function annotationEntities(elements, cfg) {
  cfg = cfg || ANNO_CONFIG_DEFAULTS;
  const out = [];
  const seatRe = new RegExp(cfg.seatingPattern || 'chair|seat|bench', 'i');

  // ── 1. Furniture outlines (A-FURN) + room cluster detection ─────────────
  const FURN_CLASSES = new Set(['IfcFurniture','IfcFurnishingElement','IfcSystemFurnitureElement']);
  const furnElems = elements.filter(el => FURN_CLASSES.has(el.ifcClass) && el.center);

  // Group by room type → cluster
  const roomClusters = {};  // room_type → {items:[{el,cx,cy}], seating:0}
  for (const el of furnElems) {
    const nm = (el.elementName || '').toLowerCase();
    let rtype = 'MISC';
    if (/(?<![a-z])bed(?![a-z])/i.test(nm))               rtype = 'BEDROOM';
    else if (/dining|table_dining/.test(nm))               rtype = 'DINING';
    else if (/chair.*dining|dining.*chair/.test(nm))        rtype = 'DINING';
    else if (/couch|sofa|settee/.test(nm))                  rtype = 'LIVING';
    else if (/table_coffee|coffee.*table|piano/.test(nm))   rtype = 'LIVING';
    else if (/chair_viper/.test(nm))                        rtype = 'LIVING';
    if (!roomClusters[rtype]) roomClusters[rtype] = { items: [], seating: 0 };
    roomClusters[rtype].items.push({ el, cx: el.center.x, cy: el.center.y });
    if (seatRe.test(nm)) roomClusters[rtype].seating++;
  }

  // Sort clusters by item count descending — largest = most detailed
  const sortedRtypes = Object.keys(roomClusters)
    .filter(r => r !== 'MISC')
    .sort((a, b) => roomClusters[b].items.length - roomClusters[a].items.length);

  let furnRendered = 0;
  sortedRtypes.forEach((rtype, ri) => {
    const cluster = roomClusters[rtype];
    const pts = cluster.items;
    const rcx = pts.reduce((s, p) => s + p.cx, 0) / pts.length;
    const rcy = pts.reduce((s, p) => s + p.cy, 0) / pts.length;

    // Assembly hall detection: large seating cluster → single aggregate bbox, no items
    let isHall = false;
    if (cluster.seating >= cfg.seatingThreshold) {
      // Compute cluster bounding bbox area
      let mnx = Infinity, mxx = -Infinity, mny = Infinity, mxy = -Infinity;
      pts.forEach(p => { mnx = Math.min(mnx, p.cx); mxx = Math.max(mxx, p.cx); mny = Math.min(mny, p.cy); mxy = Math.max(mxy, p.cy); });
      const area = (mxx - mnx) * (mxy - mny);
      if (area >= cfg.hallAreaThresholdM2) isHall = true;
    }

    if (isHall) {
      // Assembly hall: render one dashed bbox outline + label (no individual items)
      let mnx = Infinity, mxx = -Infinity, mny = Infinity, mxy = -Infinity;
      pts.forEach(p => { mnx = Math.min(mnx, p.cx) - 0.5; mxx = Math.max(mxx, p.cx) + 0.5;
                         mny = Math.min(mny, p.cy) - 0.5; mxy = Math.max(mxy, p.cy) + 0.5; });
      const hverts = [{ x: mnx, y: mny }, { x: mxx, y: mny }, { x: mxx, y: mxy }, { x: mnx, y: mxy }];
      out.push({ type: 'LWPOLYLINE', vertices: hverts, shape: true, layer: 'A-FURN' });
      out.push({ type: 'TEXT', text: 'ASSEMBLY / HALL', startPoint: { x: rcx, y: rcy + 0.4 }, textHeight: 0.4, layer: 'A-ANNO-TEXT', align: 'center' });
      out.push({ type: 'TEXT', text: pts.length + ' seats', startPoint: { x: rcx, y: rcy - 0.1 }, textHeight: 0.25, layer: 'A-ANNO-TEXT', align: 'center' });
      console.log('§ROOM HALL rtype=' + rtype + ' seats=' + cluster.seating + '/' + pts.length + ' bbox=' + (mxx-mnx).toFixed(1) + 'x' + (mxy-mny).toFixed(1) + 'm');
      furnRendered++;
      return;
    }

    // Detailed room (up to furnDetailRooms): render individual furniture items
    if (ri < cfg.furnDetailRooms) {
      const cap = Math.min(pts.length, cfg.maxFurnPerRoom);
      for (let fi = 0; fi < cap; fi++) {
        const { el, cx, cy } = pts[fi];
        let hw = 0.3, hd = 0.3;
        const dimM = el.elementName && el.elementName.match(/(\d{3,4})x(\d{3,4})mm/);
        if (dimM) { hw = parseInt(dimM[1]) / 2000; hd = parseInt(dimM[2]) / 2000; }
        const verts = [{ x: cx-hw, y: cy-hd }, { x: cx+hw, y: cy-hd }, { x: cx+hw, y: cy+hd }, { x: cx-hw, y: cy+hd }];
        out.push({ type: 'LWPOLYLINE', vertices: verts, shape: true, layer: 'A-FURN',
                   extendedData: { applicationName: 'BIMSRC', customStrings: ['guid:' + el.guid, 'ifc_class:' + el.ifcClass, 'element_name:' + (el.elementName || '')] } });
        console.log('§RENDER FURN guid=' + el.guid.substring(0,8) + ' at (' + cx.toFixed(1) + ',' + cy.toFixed(1) + ') size=' + (hw*2).toFixed(2) + 'x' + (hd*2).toFixed(2) + 'm');
        furnRendered++;
      }
      if (pts.length > cap) console.log('§ANNO_FURN_CAP rtype=' + rtype + ' shown=' + cap + '/' + pts.length + ' (maxFurnPerRoom=' + cfg.maxFurnPerRoom + ')');
    }

    // Room label (all rooms, detailed or suppressed)
    const ROOM_DISPLAY = { BEDROOM: 'BEDROOM', DINING: 'DINING ROOM', LIVING: 'LIVING ROOM', MISC: 'ROOM' };
    const label = ROOM_DISPLAY[rtype] || rtype;
    out.push({ type: 'TEXT', text: label, startPoint: { x: rcx, y: rcy + 0.4 }, textHeight: 0.4, layer: 'A-ANNO-TEXT', align: 'center' });
    out.push({ type: 'TEXT', text: pts.length + ' items', startPoint: { x: rcx, y: rcy - 0.1 }, textHeight: 0.25, layer: 'A-ANNO-TEXT', align: 'center' });
    if (ri >= cfg.furnDetailRooms) console.log('§ANNO_ROOM_SUPPRESS rtype=' + rtype + ' items=' + pts.length + ' (furnDetailRooms=' + cfg.furnDetailRooms + ')');
    console.log('§ROOM ' + label + ': centroid=(' + rcx.toFixed(1) + ',' + rcy.toFixed(1) + ') n=' + pts.length + ' detailed=' + (ri < cfg.furnDetailRooms));
  });
  console.log('§AUDIT FURN: ' + furnRendered + ' furniture outlines on A-FURN → PASS');
  console.log('§AUDIT ROOMS: ' + sortedRtypes.length + ' room labels → PASS');

  // ── 3. Door tags D1, D2… capped by maxDoorTags ────────────────────────────
  const doorElems = elements.filter(el =>
    (el.ifcClass === 'IfcDoor' || el.ifcClass === 'IfcDoorStandardCase') && el.center);
  doorElems.sort((a, b) => Math.abs(a.center.x - b.center.x) > 0.1
    ? a.center.x - b.center.x : a.center.y - b.center.y);
  const doorCap = Math.min(doorElems.length, cfg.maxDoorTags);
  if (doorElems.length > doorCap)
    console.log('§ANNO_TAG_CAP doors capped=' + doorCap + '/' + doorElems.length + ' (maxDoorTags=' + cfg.maxDoorTags + ')');
  for (let i = 0; i < doorCap; i++) {
    const el = doorElems[i];
    const tag = 'D' + (i + 1), tx = el.center.x, ty = el.center.y - 0.6;
    out.push({ type: 'CIRCLE', center: { x: tx, y: ty }, radius: 8, screenR: true, layer: 'A-ANNO-TEXT' });
    out.push({ type: 'TEXT', text: tag, startPoint: { x: tx, y: ty }, textHeight: 8, screenH: true, align: 'center', layer: 'A-ANNO-TEXT' });
    console.log('§TAG ' + tag + ': guid=' + el.guid.substring(0,8) + ' at (' + tx.toFixed(1) + ',' + ty.toFixed(1) + ')');
  }

  // ── 4. Window tags W1, W2… capped by maxWindowTags ────────────────────────
  const winElems = elements.filter(el =>
    (el.ifcClass === 'IfcWindow' || el.ifcClass === 'IfcWindowStandardCase') && el.center);
  winElems.sort((a, b) => Math.abs(a.center.x - b.center.x) > 0.1
    ? a.center.x - b.center.x : a.center.y - b.center.y);
  const winCap = Math.min(winElems.length, cfg.maxWindowTags);
  if (winElems.length > winCap)
    console.log('§ANNO_TAG_CAP windows capped=' + winCap + '/' + winElems.length + ' (maxWindowTags=' + cfg.maxWindowTags + ')');
  for (let i = 0; i < winCap; i++) {
    const el = winElems[i];
    const tag = 'W' + (i + 1), tx = el.center.x, ty = el.center.y + 0.6;
    out.push({ type: 'CIRCLE', center: { x: tx, y: ty }, radius: 8, screenR: true, layer: 'A-ANNO-TEXT' });
    out.push({ type: 'TEXT', text: tag, startPoint: { x: tx, y: ty }, textHeight: 8, screenH: true, align: 'center', layer: 'A-ANNO-TEXT' });
    console.log('§TAG ' + tag + ': guid=' + el.guid.substring(0,8) + ' at (' + tx.toFixed(1) + ',' + ty.toFixed(1) + ')');
  }
  console.log('§AUDIT TAGS: ' + doorCap + ' D-tags ' + winCap + ' W-tags → PASS');

  // ── 5. Section cut marker A-A (auto: mid-Y of building) ──────────────────
  let bx0 = Infinity, bx1 = -Infinity, by0 = Infinity, by1 = -Infinity;
  for (const el of elements) {
    if (!el.center) continue;
    if (el.center.x < bx0) bx0 = el.center.x; if (el.center.x > bx1) bx1 = el.center.x;
    if (el.center.y < by0) by0 = el.center.y; if (el.center.y > by1) by1 = el.center.y;
  }
  if (isFinite(bx0)) {
    const secY = (by0 + by1) / 2;
    const pad = Math.max((bx1 - bx0) * 0.12, 1.5);
    const lx0 = bx0 - pad, lx1 = bx1 + pad;
    const circR = Math.max((bx1 - bx0) * 0.04, 0.35);
    out.push({ type: 'LINE', vertices: [{ x: lx0, y: secY }, { x: lx1, y: secY }], layer: 'A-ANNO-SECT' });
    out.push({ type: 'CIRCLE', center: { x: lx0, y: secY }, radius: circR, layer: 'A-ANNO-SECT' });
    out.push({ type: 'TEXT', text: 'A', startPoint: { x: lx0, y: secY }, textHeight: circR * 0.9, layer: 'A-ANNO-SECT', align: 'center' });
    out.push({ type: 'CIRCLE', center: { x: lx1, y: secY }, radius: circR, layer: 'A-ANNO-SECT' });
    out.push({ type: 'TEXT', text: 'A', startPoint: { x: lx1, y: secY }, textHeight: circR * 0.9, layer: 'A-ANNO-SECT', align: 'center' });
    console.log('§RENDER SECT layer=A-ANNO-SECT A-A at y=' + secY.toFixed(1) + ' x=[' + lx0.toFixed(1) + ',' + lx1.toFixed(1) + '] r=' + circR.toFixed(2));
  }

  return out;
}

// ─── Convert elevation results → DXF-like entities ───
function elevationToEntities(elements) {
  const out = [];
  if (!window.Elevation) return out;
  const cmds = Elevation.renderElevationEntities(elements);
  for (const cmd of cmds) {
    if (cmd.type === 'line') {
      out.push({
        type: 'LINE',
        vertices: [{ x: cmd.x0, y: cmd.y0 }, { x: cmd.x1, y: cmd.y1 }],
        layer: cmd.layer || 'A-ELEV-WALL',
        extendedData: cmd.guid ? {
          applicationName: 'BIMSRC',
          customStrings: [
            'guid:' + cmd.guid,
            'ifc_class:' + (cmd.ifcClass || ''),
          ]
        } : undefined
      });
    }
  }
  console.log('§2D_GEN elevationToEntities=' + out.length);
  return out;
}

// ─── Convert grid/dim results → DXF-like entities ───
function gridToEntities(gridResult, dims, bbox) {
  const out = [];
  if (!window.GridDims) return out;
  const cmds = GridDims.renderGridEntities(gridResult, dims, bbox);
  for (const cmd of cmds) {
    if (cmd.type === 'line') {
      out.push({
        type: 'LINE',
        vertices: [{ x: cmd.x0, y: cmd.y0 }, { x: cmd.x1, y: cmd.y1 }],
        layer: cmd.layer || 'A-GRID',
      });
    } else if (cmd.type === 'text') {
      out.push({
        type: 'TEXT',
        startPoint: { x: cmd.x, y: cmd.y },
        text: cmd.text,
        textHeight: cmd.fontSize || cmd.height || 10,
        screenH: !!cmd.screenH,
        align: cmd.align || 'left',
        layer: cmd.layer || 'A-ANNO-TEXT',
      });
    } else if (cmd.type === 'circle') {
      out.push({
        type: 'CIRCLE',
        center: { x: cmd.cx, y: cmd.cy },
        radius: cmd.r,
        screenR: !!cmd.screenR,
        layer: cmd.layer || 'A-GRID',
      });
    }
  }
  console.log('§2D_GEN gridToEntities=' + out.length);
  return out;
}

// ─── Main generate function ───
async function generateFromDb() {
  if (!dbReady) {
    setStatus(typeof _TRL!=='undefined'&&_TRL.ui_2d_no_db||'No DB loaded — add ?db= to URL');
    return;
  }
  const mode = document.getElementById('view-mode').value;
  const storeyName = document.getElementById('storey-select').value;
  const t0 = performance.now();
  setStatus((typeof _TRL!=='undefined'&&_TRL.ui_2d_generating||'Generating {mode}...').replace('{mode}',mode));
  const selectedStoreyEl = document.getElementById('storey-select');
  const resolvedStorey = storeyName || selectedStoreyEl?.value || '(none)';
  console.log('§2D_GENERATE mode=' + mode + ' storey=' + resolvedStorey +
              ' dbReady=' + dbReady);

  try {
    let newEntities = [];

    if (mode === 'plan') {
      // Floor plan: section cut + grids + dims
      // For large buildings: auto-clip to centre 30m×30m window (POC limit)
      let sectionOpts = null;
      if (window.SectionCut && SectionCut.getBuildingStats) {
        const stats = SectionCut.getBuildingStats(dbMain);
        if (stats && stats.elementCount > SectionCut.MAX_ELEMENTS_POC) {
          const half = SectionCut.CLIP_MARGIN;
          sectionOpts = {
            clipBox: {
              minX: stats.centerX - half, minY: stats.centerY - half,
              maxX: stats.centerX + half, maxY: stats.centerY + half
            }
          };
          console.log('§2D_LARGE_BUILDING elements=' + stats.elementCount +
                      ' clip=[' + sectionOpts.clipBox.minX.toFixed(0) + ',' +
                      sectionOpts.clipBox.minY.toFixed(0) + ' to ' +
                      sectionOpts.clipBox.maxX.toFixed(0) + ',' +
                      sectionOpts.clipBox.maxY.toFixed(0) + ']');
          setStatus('Large building — clipping to centre 30m window…');
        }
      }
      const elements = SectionCut.sectionCut(dbMain, dbLib, null, storeyName || null, sectionOpts);
      newEntities = sectionToEntities(elements);
      const annoCfg = await getAnnoConfig();
      newEntities = newEntities.concat(annotationEntities(elements, annoCfg));

      // Compute structure bbox from actual contour vertex coords (always world-correct).
      // Do NOT use el.bbox2d — it is 0,0,0,0 when elements_rtree is absent (fallback query).
      let bx0 = Infinity, by0 = Infinity, bx1 = -Infinity, by1 = -Infinity;
      for (const ent of newEntities) {
        if (ent.vertices) ent.vertices.forEach(v => {
          if (v.x < bx0) bx0 = v.x; if (v.y < by0) by0 = v.y;
          if (v.x > bx1) bx1 = v.x; if (v.y > by1) by1 = v.y;
        });
      }
      // Fall back to getBuildingStats if section cut returned no contours
      if (!isFinite(bx0) && SectionCut.getBuildingStats) {
        const stats = SectionCut.getBuildingStats(dbMain);
        if (stats) { bx0 = stats.minX; by0 = stats.minY; bx1 = stats.maxX; by1 = stats.maxY; }
      }
      const structBbox = { minX: bx0, minY: by0, maxX: bx1, maxY: by1 };
      console.log('§2D_STRUCT_BBOX x=[' + bx0.toFixed(2) + ',' + bx1.toFixed(2) +
                  '] y=[' + by0.toFixed(2) + ',' + by1.toFixed(2) + ']');

      // Compute viewScale once — used by both GridDims (crowding) and TitleBlock (scale bar)
      const _bw = bx1 - bx0 || 1, _bh = by1 - by0 || 1;
      const _pad = Math.max(_bw * 0.20, 3);
      const _computedScale = isFinite(bx0)
        ? Math.min((canvas.width - 40) / (_bw + _pad * 2), (canvas.height - 40) / (_bh + _pad * 2))
        : 50;  // safe fallback px/m

      // Add grids + dimensions — pass structBbox so grid/dims align with building
      if (window.GridDims) {
        const gridResult = GridDims.detectGrids(dbMain);
        if (gridResult.xLines.length > 0 || gridResult.yLines.length > 0) {
          const dims = GridDims.generateDimensions(gridResult);
          newEntities = newEntities.concat(gridToEntities(gridResult, dims, structBbox, { viewScale: _computedScale }));
        }
      }
      // Store for fitView to zoom to structure only
      window._structBbox = isFinite(bx0) ? structBbox : null;

      // Title block + scale bar + north arrow
      if (window.TitleBlock && isFinite(bx0)) {
        const bldName = (params.get('bld') || 'Building').replace(/^S\d+_\d+_/, '');
        const tbEnts = TitleBlock.render({
          buildingName: bldName,
          storeyName: storeyName || document.getElementById('storey-select').value || '',
          viewScale: _computedScale,
          structBbox: structBbox,
          date: new Date().toISOString().slice(0, 10),
        });
        newEntities = newEntities.concat(tbEnts);
      }
    } else {
      // Elevation: front/rear/left/right
      const elements = Elevation.generateElevation(dbMain, dbLib, mode);
      newEntities = elevationToEntities(elements);
    }

    const dt = performance.now() - t0;
    generatedEntities = newEntities;

    // Feed into existing renderer (same path as parseDxf)
    entities = newEntities;
    window.dxf = { entities: newEntities };
    layerVisibility = {};
    const layers = new Set();
    entities.forEach(e => { if (e.layer) layers.add(e.layer); });
    layers.forEach(l => { layerVisibility[l] = true; });
    buildLayerPanel();
    document.getElementById('ent-count').textContent = entities.length;
    document.getElementById('layer-count').textContent = layers.size;
    setStatus((typeof _TRL!=='undefined'&&_TRL.ui_2d_generated||'Generated: {n} entities, {l} layers ({ms}ms)').replace('{n}',entities.length).replace('{l}',layers.size).replace('{ms}',dt.toFixed(0)));
    console.log('§2D_DONE entities=' + entities.length + ' layers=' + layers.size + ' time=' + dt.toFixed(0) + 'ms');
    // Guard: only fitView/replace if we got something — keep inline default if generation fails
    if (entities.length === 0) {
      console.warn('§2D_EMPTY generation returned 0 entities — keeping previous view');
      setStatus('No entities generated for this storey/mode');
      return;
    }
    fitView();
  } catch (e) {
    console.error('§2D_GEN_ERROR', e);
    setStatus('Generate error: ' + e.message);
  }
}

// ─── DXF Export ───
function exportDxf() {
  const ents = generatedEntities.length > 0 ? generatedEntities : entities;
  if (!ents.length) { setStatus(typeof _TRL!=='undefined'&&_TRL.ui_2d_nothing_export||'Nothing to export'); return; }
  if (!window.DxfExport) { setStatus('DXF export module not loaded'); return; }

  // Convert renderer entities to DxfExport format
  const exportEnts = [];
  for (const e of ents) {
    if (e.type === 'LINE' && e.vertices && e.vertices.length >= 2) {
      const exp = { type: 'line', x0: e.vertices[0].x, y0: e.vertices[0].y,
                    x1: e.vertices[1].x, y1: e.vertices[1].y, layer: e.layer };
      if (e.extendedData && e.extendedData.customStrings) {
        const kv = {};
        e.extendedData.customStrings.forEach(s => { const i = s.indexOf(':'); if (i > 0) kv[s.slice(0,i)] = s.slice(i+1); });
        if (kv.guid) { exp.guid = kv.guid; exp.ifcClass = kv.ifc_class; }
      }
      exportEnts.push(exp);
    } else if ((e.type === 'LWPOLYLINE' || e.type === 'POLYLINE') && e.vertices) {
      const exp = { type: 'polyline', points: e.vertices.map(v => [v.x, v.y]),
                    closed: !!e.shape, layer: e.layer };
      if (e.extendedData && e.extendedData.customStrings) {
        const kv = {};
        e.extendedData.customStrings.forEach(s => { const i = s.indexOf(':'); if (i > 0) kv[s.slice(0,i)] = s.slice(i+1); });
        if (kv.guid) { exp.guid = kv.guid; exp.ifcClass = kv.ifc_class; }
      }
      exportEnts.push(exp);
    } else if (e.type === 'CIRCLE' && e.center) {
      exportEnts.push({ type: 'circle', cx: e.center.x, cy: e.center.y, r: e.radius, layer: e.layer });
    } else if (e.type === 'TEXT' || e.type === 'MTEXT') {
      const pos = e.startPoint || e.position;
      if (pos) exportEnts.push({ type: 'text', x: pos.x, y: pos.y, text: e.text || '', height: e.textHeight || 2.5, layer: e.layer });
    }
  }

  const mode = document.getElementById('view-mode').value;
  const filename = (prefix || 'BIM') + '_' + mode.toUpperCase() + '.dxf';
  DxfExport.downloadDxf(exportEnts, { title: mode + ' view' }, filename);
  console.log('§2D_EXPORT file=' + filename + ' entities=' + exportEnts.length);
}

// ─── Init DB loading (non-blocking, alongside DXF path) ───
loadDatabases();
</script>
