    background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px 12px;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);

  }
  .toolbar button:hover { background: #4fc3f7; color: #000; }
  #status { color: #4fc3f7; font-size: 12px; margin-top: 12px; }

if (params.get('cur2')) _TRL.cur2 = params.get('cur2');

// Currency helpers — read from _TRL at call time so locale_loader overrides take effect

// WORK_PACKAGES — from rates.js

// ============================================================================
// COMPUTED STATE
// ============================================================================
let db = null, bldName = '';
let _dbSourceLine = '';   // S238: captured at load, re-emitted on each export
let qtoData = [];        // per storey/disc/class rows
let discSummary = {};     // disc -> {qty, matTotal, laborCost, equipCost}
let grandMaterial = 0, grandLabor = 0, grandEquip = 0, totalQty = 0;
let scheduleData = [];    // generated 4D tasks
let chartInstances = [];

// calcLabor(), calcEquipment() — from rates.js

// ============================================================================
// SCHEDULE GENERATION — realistic storey-by-storey, phase-dependent
// ============================================================================
// Model:
//  - Storeys processed bottom-up within each phase
//  - Tasks in same phase+storey run concurrently (different trades)
//  - Next storey starts after previous storey (small overlap lag)
//  - Next phase on a storey starts after previous phase on THAT storey finishes + lag
//  - Single-task duration capped at ~20 days; parallel crews added beyond that
//  - Working days: Mon-Sat (JS getDay: 1-6)

function generateSchedule(activities, startDateStr) {
  const projectStart = new Date(startDateStr || '2025-01-06');

  // Mon-Sat working (JS getDay: 0=Sun, 1=Mon ... 6=Sat)
  const isWorkDay = d => { const w = d.getDay(); return w >= 1 && w <= 6; };

  // Advance by N working days from a date
  function addWorkDays(from, n) {
    const d = new Date(from);
    let rem = Math.ceil(n);
    while (rem > 0) { d.setDate(d.getDate() + 1); if (isWorkDay(d)) rem--; }
    return d;
  }

  // Storey sort: basements < ground < levels < roof
  function storeyRank(s) {
    if (!s) return 999;
    const u = s.toUpperCase();
    if (u.includes('ROOF')) return 900;
    if (u.includes('BASEMENT') || u.startsWith('B')) return -10 + (parseInt(u.replace(/\D/g,''))||0);
    if (u === 'GROUND' || u === 'G' || u === 'G0' || u === 'GF') return 0;
    const n = parseInt(u.replace(/\D/g,''));
    return isNaN(n) ? 50 : n;
  }

  const PHASE_ORDER = ['Substructure','Superstructure','MEP Rough-in','Architecture','MEP Final','Finishes'];
  const INTER_PHASE_LAG = 5;   // working days between phases on same storey
  const INTER_STOREY_LAG = 2;  // working days between storeys in same phase
  const MAX_TASK_DAYS = 20;    // cap before adding parallel crews

  // Group activities by phase -> storey
  const grouped = {};  // phase|||storey -> [act, ...]
  const phaseSets = {};
  for (const act of activities) {
    const rules = SEQUENCE_RULES[act.cls] || DEFAULT_RULE;
    const phase = rules.phase;
    const storey = act.storey || 'Unknown';
    const key = `${phase}|||${storey}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push({...act, phase, rules});
    if (!phaseSets[phase]) phaseSets[phase] = new Set();
    phaseSets[phase].add(storey);
  }

  // Sort storeys per phase
  for (const p of Object.keys(phaseSets)) {
    phaseSets[p] = [...phaseSets[p]].sort((a,b) => storeyRank(a) - storeyRank(b));
  }

  // storeyPhaseEnd[storey][phase] = finish date
  const storeyPhaseEnd = {};
  const phaseFirstStart = {}; // phase -> date when first storey of this phase finishes
  const tasks = [];
  let taskId = 0;

  for (const phase of PHASE_ORDER) {
    if (!phaseSets[phase]) continue;
    let prevStoreyEnd = null;

    for (const storey of phaseSets[phase]) {
      const key = `${phase}|||${storey}`;
      const acts = grouped[key];
      if (!acts) continue;

      // Start date: wait for (a) latest earlier phase on this storey, (b) previous storey in this phase
      let storeyStart = new Date(projectStart);

      // Walk back through ALL earlier phases to find the latest one with data for this storey
      const phaseIdx = PHASE_ORDER.indexOf(phase);
      if (phaseIdx > 0 && storeyPhaseEnd[storey]) {
        for (let pi = phaseIdx - 1; pi >= 0; pi--) {
          const earlierPhase = PHASE_ORDER[pi];
          if (storeyPhaseEnd[storey][earlierPhase]) {
            const after = addWorkDays(storeyPhaseEnd[storey][earlierPhase], INTER_PHASE_LAG);
            if (after > storeyStart) storeyStart = after;
            break;
          }
        }
      }
      // Also wait for ANY earlier phase globally (prevents phases from starting before predecessors)
      if (phaseIdx > 0) {
        for (let pi = phaseIdx - 1; pi >= 0; pi--) {
          if (phaseFirstStart[PHASE_ORDER[pi]]) {
            const after = addWorkDays(phaseFirstStart[PHASE_ORDER[pi]], INTER_PHASE_LAG);
            if (after > storeyStart) storeyStart = after;
            break;
          }
        }
      }
      if (prevStoreyEnd) {
        const after = addWorkDays(prevStoreyEnd, INTER_STOREY_LAG);
        if (after > storeyStart) storeyStart = after;
      }

      // S240c: One grouped task per (phase, storey) — aggregate all IFC classes
      let maxDuration = 0;
      let totalQtyGroup = 0;
      let totalCrew = 0;
      const ifcClasses = [];
      const disciplines = new Set();
      const resources = new Set();
      const equipments = new Set();

      for (const act of acts) {
        const prod = act.labor.prod || 10;
        let duration = Math.max(1, act.qty / prod);
        let crews = 1;
        if (duration > MAX_TASK_DAYS) {
          crews = Math.ceil(duration / MAX_TASK_DAYS);
          duration = Math.ceil(duration / crews);
        }
        if (duration > maxDuration) maxDuration = duration;
        totalQtyGroup += act.qty;
        totalCrew = Math.max(totalCrew, (act.labor.crew || 2) * crews);
        ifcClasses.push(act.cls);
        disciplines.add(act.disc);
        const res = act.labor.tradeKey || act.rules.resource;
        if (res) resources.add(res);
        const equipAlloc = EQUIPMENT_ALLOCATION[act.cls];
        if (equipAlloc) equipments.add(EQUIPMENT_RATES[equipAlloc.equipment].desc);
      }

      const taskFinish = addWorkDays(storeyStart, maxDuration);
      const calendarDays = Math.round((taskFinish - storeyStart) / 86400000);
      const discLabel = [...disciplines].join('/');
      taskId++;
      tasks.push({
        id: taskId,
        wbs: `1.${PHASE_ORDER.indexOf(phase)+1}.${taskId}`,
        name: `${storey} - ${phase} (${discLabel})`,
        ifcClasses,
        phase,
        discipline: discLabel,
        storey,
        qty: totalQtyGroup,
        uom: 'MIX',
        productivity: totalQtyGroup > 0 ? Math.round(totalQtyGroup / maxDuration) : 0,
        duration: calendarDays,
        crews: 1,
        startDate: storeyStart.toISOString().slice(0,10),
        finishDate: taskFinish.toISOString().slice(0,10),
        resource: [...resources].join(','),
        crew: totalCrew,
        equipment: [...equipments].join(', '),
        startDay: Math.round((storeyStart - projectStart) / 86400000),
        finishDay: Math.round((taskFinish - projectStart) / 86400000),
      });

      if (!storeyPhaseEnd[storey]) storeyPhaseEnd[storey] = {};
      storeyPhaseEnd[storey][phase] = taskFinish;
      if (!phaseFirstStart[phase]) phaseFirstStart[phase] = taskFinish;
      prevStoreyEnd = taskFinish;
    }
  }
  return tasks;
}

// ============================================================================
// 4D SCHEDULE AUDIT — S240 §0.1 (8 checks, must all PASS before sync)
// ============================================================================
function audit4DSchedule(scheduleData, db, qtoData) {
  const results = [];
  const PHASE_ORDER = ['Substructure','Superstructure','MEP Rough-in','Architecture','MEP Final','Finishes'];

  // Check 1: Task coverage — every IFC class in DB maps to SEQUENCE_RULES (no DEFAULT)
  const dbClasses = qtoData.map(r => r.cls);
  const unmapped = [...new Set(dbClasses.filter(c => !SEQUENCE_RULES[c]))];
  const c1 = unmapped.length === 0;
  console.log('§4D_AUDIT_COVERAGE ' + (c1 ? 'PASS' : 'FAIL') + ' unmapped=[' + unmapped.join(',') + ']');
  results.push({name:'COVERAGE', pass:c1});

  // Check 2: Phase order — no phase inversion in task sequence
  let c2 = true;
  let lastPhaseIdx = -1;
  const tasksByOrder = [...scheduleData].sort((a,b) => a.startDay - b.startDay || PHASE_ORDER.indexOf(a.phase) - PHASE_ORDER.indexOf(b.phase));
  for (const t of tasksByOrder) {
    const pi = PHASE_ORDER.indexOf(t.phase);
    if (pi < 0) continue;
    // Allow same phase — only flag if a later task's phase is strictly earlier AND starts later
    // Phase inversion = a task in an earlier phase starts AFTER a task in a later phase on the SAME storey
  }
  // Stricter check: per-storey, no earlier phase starting after a later phase
  const storeyPhaseStarts = {};
  for (const t of scheduleData) {
    const key = t.storey + '|||' + t.phase;
    if (!storeyPhaseStarts[key] || t.startDay < storeyPhaseStarts[key]) {
      storeyPhaseStarts[key] = t.startDay;
    }
  }
  const storeys = [...new Set(scheduleData.map(t => t.storey))];
  const inversions = [];
  for (const st of storeys) {
    for (let i = 0; i < PHASE_ORDER.length - 1; i++) {
      for (let j = i + 1; j < PHASE_ORDER.length; j++) {
        const earlyStart = storeyPhaseStarts[st + '|||' + PHASE_ORDER[i]];
        const lateStart = storeyPhaseStarts[st + '|||' + PHASE_ORDER[j]];
        if (earlyStart !== undefined && lateStart !== undefined && lateStart < earlyStart) {
          inversions.push(st + ':' + PHASE_ORDER[j] + '<' + PHASE_ORDER[i]);
          c2 = false;
        }
      }
    }
  }
  console.log('§4D_AUDIT_PHASE_ORDER ' + (c2 ? 'PASS' : 'FAIL') + (inversions.length ? ' inversions=[' + inversions.join(',') + ']' : ' ok=true'));
  results.push({name:'PHASE_ORDER', pass:c2});

  // Check 3: Storey order — within each phase, storeys run bottom-up
  let c3 = true;
  const storeyViolations = [];
  function storeyRank(s) {
    if (!s) return 999;
    const u = s.toUpperCase();
    if (u.includes('ROOF')) return 900;
    if (u.includes('BASEMENT') || u.startsWith('B')) return -10 + (parseInt(u.replace(/\D/g,''))||0);
    if (u === 'GROUND' || u === 'G' || u === 'G0' || u === 'GF') return 0;
    const n = parseInt(u.replace(/\D/g,''));
    return isNaN(n) ? 50 : n;
  }
  for (const phase of PHASE_ORDER) {
    const phaseTasks = scheduleData.filter(t => t.phase === phase);
    const storeyStarts = {};
    for (const t of phaseTasks) {
      if (!storeyStarts[t.storey] || t.startDay < storeyStarts[t.storey]) {
        storeyStarts[t.storey] = t.startDay;
      }
    }
    const sorted = Object.entries(storeyStarts).sort((a,b) => a[1] - b[1]);
    for (let i = 1; i < sorted.length; i++) {
      if (storeyRank(sorted[i][0]) < storeyRank(sorted[i-1][0])) {
        storeyViolations.push(phase + ':' + sorted[i-1][0] + '>' + sorted[i][0]);
        c3 = false;
      }
    }
  }
  console.log('§4D_AUDIT_STOREY_ORDER ' + (c3 ? 'PASS' : 'FAIL') + (storeyViolations.length ? ' violations=[' + storeyViolations.join(',') + ']' : ' ok=true'));
  results.push({name:'STOREY_ORDER', pass:c3});

  // Check 4: Duration sanity — no task >120 days, no task <1 day
  const outliers = scheduleData.filter(t => t.duration > 120 || t.duration < 1).map(t => t.name + '=' + t.duration + 'd');
  const c4 = outliers.length === 0;
  console.log('§4D_AUDIT_DURATION ' + (c4 ? 'PASS' : 'FAIL') + ' outliers=[' + outliers.join(',') + ']');
  results.push({name:'DURATION', pass:c4});

  // Check 5: Overlap sanity — no two tasks with same phase on same storey (grouped = impossible, but verify)
  let c5 = true;
  const conflicts = [];
  for (let i = 0; i < scheduleData.length; i++) {
    for (let j = i + 1; j < scheduleData.length; j++) {
      const a = scheduleData[i], b = scheduleData[j];
      if (a.storey === b.storey && a.phase === b.phase &&
          a.startDay < b.finishDay && b.startDay < a.finishDay) {
        conflicts.push(a.name + ' vs ' + b.name);
        c5 = false;
      }
    }
  }
  console.log('§4D_AUDIT_OVERLAP ' + (c5 ? 'PASS' : 'FAIL') + ' conflicts=[' + conflicts.slice(0,5).join('; ') + (conflicts.length > 5 ? '..+' + (conflicts.length-5) : '') + ']');
  results.push({name:'OVERLAP', pass:c5});

  // Check 6: Total duration — project total ≤ 3× naive serial sum
  const serialSum = scheduleData.reduce((s,t) => s + t.duration, 0);
  const projectDays = scheduleData.length ? Math.max(...scheduleData.map(t => t.finishDay)) : 0;
  const ratio = serialSum > 0 ? (projectDays / serialSum).toFixed(2) : 0;
  const c6 = projectDays <= 3 * serialSum;
  console.log('§4D_AUDIT_TOTAL ' + (c6 ? 'PASS' : 'FAIL') + ' days=' + projectDays + ' serial=' + Math.round(serialSum) + ' ratio=' + ratio);
  results.push({name:'TOTAL', pass:c6});

  // Check 7: Gantt bar labels — no undefined/[object Object], no empty names
  const badLabels = scheduleData.filter(t => !t.name || t.name.includes('undefined') || t.name.includes('[object'));
  const c7 = badLabels.length === 0;
  console.log('§4D_AUDIT_LABELS ' + (c7 ? 'PASS' : 'FAIL') + (badLabels.length ? ' bad=[' + badLabels.map(t=>t.name).join(',') + ']' : ' ok=true'));
  results.push({name:'LABELS', pass:c7});

  // Check 8: Task↔GUID resolution — every grouped task resolves to ≥1 GUID
  let c8 = true;
  const orphaned = [];
  if (db) {
    for (const t of scheduleData) {
      const classes = t.ifcClasses || (t.ifcClass ? [t.ifcClass] : []);
      if (!classes.length) { orphaned.push(t.name); c8 = false; continue; }
      let totalCount = 0;
      try {
        for (const cls of classes) {
          const res = db.exec("SELECT COUNT(*) FROM elements_meta WHERE ifc_class = '" +
            cls.replace(/'/g,"''") + "' AND storey = '" +
            (t.storey||'').replace(/'/g,"''") + "'");
          totalCount += (res[0]?.values[0]?.[0] || 0);
        }
        if (totalCount === 0) { orphaned.push(t.name + '(0 GUIDs)'); c8 = false; }
      } catch(e) {
        orphaned.push(t.name + '(query error)');
        c8 = false;
      }
    }
  }
  console.log('§4D_AUDIT_GUIDS ' + (c8 ? 'PASS' : 'FAIL') + ' orphaned=[' + orphaned.slice(0,5).join(',') + (orphaned.length > 5 ? '..+' + (orphaned.length-5) : '') + ']');
  results.push({name:'GUIDS', pass:c8});

  // Summary
  const failCount = results.filter(r => !r.pass).length;
  console.log('§4D_AUDIT_SUMMARY pass=' + results.filter(r=>r.pass).length + ' fail=' + failCount + ' total=8');

  // Show warning banner if any fail
  if (failCount > 0) {
    let banner = document.getElementById('audit4d-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'audit4d-banner';
      banner.style.cssText = 'background:#fff3cd;color:#856404;border:1px solid #ffc107;padding:8px 12px;margin:8px 0;border-radius:4px;font-weight:bold;';
      const info = document.getElementById('info');
      if (info) info.parentNode.insertBefore(banner, info.nextSibling);
    }
    var failNames = results.filter(r => !r.pass).map(r => r.name);
    banner.textContent = '\u26a0 Schedule audit: ' + failNames.join(', ') + (failNames.indexOf('COVERAGE') >= 0 && unmapped.length ? ' \u2014 unmapped: ' + unmapped.join(', ') : '');
  }

  return { results, failCount };
}

// S238: Fetch DB buffer — checks bim_ootb_cache IDB first (same cache as scene.js), falls back to fetch
// import:// URLs: IDB only (no network). OCI URLs: IDB first (scene.js wrote it), then network.
async function fetchDbBuffer(url) {
  const _tFetch = performance.now();
  const cacheDb = await new Promise(resolve => {
    const req = indexedDB.open('bim_ootb_cache', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('dbs');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });

  if (cacheDb) {
    const cached = await new Promise(resolve => {
      const tx = cacheDb.transaction('dbs', 'readonly');
      const req = tx.objectStore('dbs').get(url);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
    if (cached) {
      const src = url.startsWith('import://') ? 'import' : 'idb';
      _dbSourceLine = '§CHARTS_DB_SOURCE source=' + src + ' url=' + url.split('/').pop() + ' size=' + (cached.byteLength / 1024).toFixed(0) + 'KB fetchMs=' + Math.round(performance.now() - _tFetch);
      _log(_dbSourceLine);
      return cached;
    }
  }

  if (url.startsWith('import://')) throw new Error('DB not found in cache: ' + url);

  _dbSourceLine = '§CHARTS_DB_SOURCE source=oci url=' + url.split('/').pop();
  _log(_dbSourceLine);
  return fetch(url).then(r => r.arrayBuffer());
}

// S253: Try BroadcastChannel relay from viewer (instant) before loading DB (slow)
async function _tryChannelRelay(timeoutMs) {
  return new Promise(function(resolve) {
    try {
      var ch = new BroadcastChannel('bim_4d');
      var timer = setTimeout(function() { ch.close(); resolve(null); }, timeoutMs);
      ch.onmessage = function(evt) {
        if (evt.data && evt.data.type === '4D_QTO_RESPONSE') {
          clearTimeout(timer);
          ch.close();
          resolve(evt.data);
        }
      };
      ch.postMessage({ type: '4D_QTO_REQUEST' });
      console.log('§QTO_RELAY_REQUEST sent — waiting ' + timeoutMs + 'ms');
    } catch(e) { resolve(null); }
  });
}

}

// S253d: Build scheduleData from kernel_ops — single source of truth with hourglass
function buildScheduleFromOps(ops) {
  const PHASE_ORDER = ['Substructure','Superstructure','MEP Rough-in','Architecture','MEP Final','Finishes'];

  // Group ops by phase+storey (same grouping as generateSchedule)
  var groups = {};  // "phase|||storey" → { ops[], minTs, maxTs, ... }
  for (var i = 0; i < ops.length; i++) {
    var op = ops[i];
    if (op.op_type !== 'ELEMENT_PLACE') continue;
    var phase = op.phase || 'Architecture';
    var storey = op.storey || 'Unknown';
    var key = phase + '|||' + storey;
    if (!groups[key]) {
      groups[key] = {
        phase: phase, storey: storey,
        minTs: op.start_ts, maxTs: op.end_ts,
        qty: 0, guids: [], classes: new Set(), disciplines: new Set(), resources: new Set()
      };
    }
    var g = groups[key];
    if (op.start_ts < g.minTs) g.minTs = op.start_ts;
    if (op.end_ts > g.maxTs) g.maxTs = op.end_ts;
    g.qty++;
    if (op.guid) g.guids.push(op.guid);
    if (op.cls) g.classes.add(op.cls);
    if (op.resource) g.resources.add(op.resource);
    // Derive discipline from SEQUENCE_RULES
    var rule = SEQUENCE_RULES[op.cls];
    if (rule && rule.resource) {
      var res = rule.resource;
      if (res === 'HVAC_TECH' || res === 'PLUMBER' || res === 'ELECTRICIAN') g.disciplines.add('MEP');
      else if (res === 'STEEL_ERECTOR' || res === 'CONCRETE_GANG') g.disciplines.add('STR');
      else g.disciplines.add('ARC');
    }
  }

  // Find project start from ops
  var projectStartMs = Infinity;
  for (var k in groups) {
    if (groups[k].minTs < projectStartMs) projectStartMs = groups[k].minTs;
  }
  if (!isFinite(projectStartMs)) projectStartMs = Date.now();
  var msPerDay = 86400000;

  // Sort groups by phase order then minTs
  var sorted = Object.values(groups).sort(function(a, b) {
    var pa = PHASE_ORDER.indexOf(a.phase), pb = PHASE_ORDER.indexOf(b.phase);
    if (pa < 0) pa = 99; if (pb < 0) pb = 99;
    if (pa !== pb) return pa - pb;
    return a.minTs - b.minTs;
  });

  var tasks = [];
  for (var si = 0; si < sorted.length; si++) {
    var grp = sorted[si];
    var startDay = Math.max(0, Math.round((grp.minTs - projectStartMs) / msPerDay));
    var finishDay = Math.max(startDay + 1, Math.round((grp.maxTs - projectStartMs) / msPerDay));
    var duration = finishDay - startDay;
    var discLabel = [...grp.disciplines].join('/') || 'GEN';
    var crewSize = 0;
    grp.resources.forEach(function(r) { crewSize += (LABOR_RATES[r] && LABOR_RATES[r].crew_size) || 2; });

    tasks.push({
      id: si + 1,
      wbs: '1.' + (PHASE_ORDER.indexOf(grp.phase) + 1) + '.' + (si + 1),
      name: grp.storey + ' - ' + grp.phase + ' (' + discLabel + ')',
      ifcClasses: [...grp.classes],
      phase: grp.phase,
      discipline: discLabel,
      storey: grp.storey,
      qty: grp.qty,
      uom: 'EA',
      productivity: grp.qty > 0 && duration > 0 ? Math.round(grp.qty / duration) : 0,
      duration: duration,
      crews: 1,
      startDate: new Date(grp.minTs).toISOString().slice(0, 10),
      finishDate: new Date(grp.maxTs).toISOString().slice(0, 10),
      resource: [...grp.resources].join(','),
      crew: Math.max(1, crewSize),
      equipment: '',
      startDay: startDay,
      finishDay: finishDay,
      guids: grp.guids
    });
  }
  console.log('§4D_SCHEDULE built ' + tasks.length + ' tasks from ' + ops.length + ' kernel_ops');
  return tasks;
}

async function init() {
  // §1.2: Load rate template from JSON before any cost calculation
  if (typeof initRateTemplate === 'function') {
    await initRateTemplate();
  } else {
    console.warn('§QTO_RATES_FALLBACK initRateTemplate not available — using hardcoded rates');
  }

  // Build unit lookup from RATES: which IFC classes are M, M2, EA, KG
  const LINEAR_CLASSES = new Set();   // unit = M
  const AREA_CLASSES = new Set();     // unit = M2
  for (const cls in RATES) {
    if (RATES[cls].unit === 'M')  LINEAR_CLASSES.add(cls);
    if (RATES[cls].unit === 'M2') AREA_CLASSES.add(cls);
  }

  const _t0 = performance.now();
  let countRows, linearQty = {}, areaQty = {};
  var _relayGuids = null;  // S253d: relayed GUIDs from viewer (populated in relay path)

  // S253: Fast path — ask viewer for data via BroadcastChannel (no DB load)
  // §S260b: Increased timeout 500→2000ms — viewer may be busy streaming geometry
  document.getElementById('info').textContent = 'Requesting data from viewer...';
  const relay = await _tryChannelRelay(2000);

  if (relay && !relay.error && relay.countRows && relay.countRows.length) {
    // Viewer answered — use relayed data directly
    bldName = relay.building || BLD || 'Unknown';
    countRows = [{ values: relay.countRows }];
    if (relay.dimRows) {
      for (const r of relay.dimRows) {
        const key = r[0] + '|' + r[1] + '|' + r[2];
        linearQty[key] = r[3];
        areaQty[key] = r[4];
      }
    }
    console.log('§QTO_RELAY_HIT building=' + bldName + ' rows=' + relay.countRows.length +
      ' dims=' + (relay.dimRows ? relay.dimRows.length : 0) +
      ' guids=' + (relay.guidRows ? relay.guidRows.length : 0) +
      ' relayMs=' + Math.round(performance.now() - _t0));
    // S253d: Store relayed GUIDs for task resolution (no DB load needed)
    var _relayGuids = {};  // "ifc_class|storey" → [guid, ...]
    if (relay.guidRows) {
      for (var gi = 0; gi < relay.guidRows.length; gi++) {
        var gr = relay.guidRows[gi]; // [guid, ifc_class, storey]
        var gk = gr[1] + '|' + gr[2];
        if (!_relayGuids[gk]) _relayGuids[gk] = [];
        _relayGuids[gk].push(gr[0]);
      }
    }
  } else if (relay && relay.error === 'no_db') {
    // §S260b: Viewer is open but DB not ready yet (still streaming) — wait and retry
    document.getElementById('info').textContent = 'Waiting for DB to cache in main scene...';
    console.log('§QTO_RELAY_WAIT viewer has no DB yet — retrying in 3s');
    await new Promise(function(r) { setTimeout(r, 3000); });
    const retry = await _tryChannelRelay(3000);
    if (retry && !retry.error && retry.countRows && retry.countRows.length) {
      bldName = retry.building || BLD || 'Unknown';
      countRows = [{ values: retry.countRows }];
      if (retry.dimRows) {
        for (const r of retry.dimRows) {
          var k = r[0] + '|' + r[1] + '|' + r[2];
          linearQty[k] = r[3]; areaQty[k] = r[4];
        }
      }
      console.log('§QTO_RELAY_RETRY_HIT building=' + bldName + ' rows=' + retry.countRows.length);
      if (retry.guidRows) {
        _relayGuids = {};
        for (var gi = 0; gi < retry.guidRows.length; gi++) {
          var gr = retry.guidRows[gi];
          var gk = gr[1] + '|' + gr[2];
          if (!_relayGuids[gk]) _relayGuids[gk] = [];
          _relayGuids[gk].push(gr[0]);
        }
      }
    }
  }
  if (!countRows) {
    // Fallback — load DB the slow way (viewer not open or no response)
    console.log('§QTO_RELAY_MISS reason=' + (relay ? relay.error || 'empty' : 'timeout') +
      ' — loading DB from ' + (DB_URL.startsWith('import://') ? 'IndexedDB' : 'OCI'));
    // §S260b+S274: Try _meta.db first (4D5D only needs metadata, not geometry)
    var _actualUrl = DB_URL;
    if (DB_URL.indexOf('_extracted.db') > -1) {
      var _metaUrl = DB_URL.replace('_extracted.db', '_meta.db');
      if (DB_URL.startsWith('import://')) {
        // §S274: import:// URLs live in IDB — check cache via fetchDbBuffer
        try {
          var _metaBuf = await fetchDbBuffer(_metaUrl);
          if (_metaBuf) { _actualUrl = _metaUrl; console.log('§QTO_SPLIT_HIT_IDB using ' + _metaUrl + ' (' + Math.round(_metaBuf.byteLength/1024/1024) + 'MB)'); }
        } catch(e) {}
      } else {
        try {
          var _headResp = await fetch(_metaUrl, { method: 'HEAD' });
          if (_headResp.ok) {
            _actualUrl = _metaUrl;
            console.log('§QTO_SPLIT_HIT using ' + _metaUrl);
          }
        } catch(e) {}
      }
    }
    const SQL = await initSqlJs({
      locateFile: f => 'lib/' + f
    });
    document.getElementById('info').textContent = 'Loading ' + _actualUrl + '...';
    const buf = await fetchDbBuffer(_actualUrl);
    db = new SQL.Database(new Uint8Array(buf));
    console.log('§DB_INIT loadMs=' + Math.round(performance.now() - _t0) + ' size=' + Math.round(buf.byteLength / 1024 / 1024) + 'MB');

    // Determine building
    bldName = BLD;
    if (!bldName) {
      const r = db.exec("SELECT building, COUNT(*) c FROM elements_meta GROUP BY building ORDER BY c DESC LIMIT 1");
      bldName = r.length ? r[0].values[0][0] : 'Unknown';
    }
    const _bldSafe = bldName.replace(/'/g,"''");

    // §6.3: Create qto_cache table if not exists (write-back for fast repeat access)
    try {
      db.run('CREATE TABLE IF NOT EXISTS qto_cache (' +
        'ifc_class TEXT NOT NULL, storey TEXT NOT NULL, discipline TEXT NOT NULL,' +
        'qty REAL NOT NULL, uom TEXT NOT NULL, element_count INTEGER NOT NULL,' +
        'material_cost REAL, labour_cost REAL, equipment_cost REAL,' +
        'rate_template TEXT, computed_at TEXT,' +
        'PRIMARY KEY (ifc_class, storey, discipline, rate_template))');
    } catch(e) {}

    countRows = db.exec(
      "SELECT m.discipline, m.ifc_class, m.storey, COUNT(*) as cnt," +
      " COUNT(DISTINCT i.geometry_hash) as meshes" +
      " FROM elements_meta m LEFT JOIN element_instances i ON m.guid = i.guid" +
      " WHERE m.building = '" + _bldSafe + "'" +
      " GROUP BY m.discipline, m.ifc_class, m.storey" +
      " ORDER BY m.discipline, m.storey, cnt DESC"
    );

    try {
      const dimRows = db.exec(
        "SELECT m.discipline, m.ifc_class, m.storey," +
        " SUM(MAX(t.bbox_x, t.bbox_y, t.bbox_z)) as total_length," +
        " SUM(MAX(t.bbox_x, t.bbox_y, t.bbox_z) *" +
        " CASE WHEN t.bbox_x >= t.bbox_y AND t.bbox_x >= t.bbox_z THEN MAX(t.bbox_y, t.bbox_z)" +
        " WHEN t.bbox_y >= t.bbox_x AND t.bbox_y >= t.bbox_z THEN MAX(t.bbox_x, t.bbox_z)" +
        " ELSE MAX(t.bbox_x, t.bbox_y) END) as total_area" +
        " FROM elements_meta m JOIN element_transforms t ON m.guid = t.guid" +
        " WHERE m.building = '" + _bldSafe + "' AND t.bbox_x IS NOT NULL AND t.bbox_x > 0" +
        " GROUP BY m.discipline, m.ifc_class, m.storey"
      );
      if (dimRows.length) {
        for (const r of dimRows[0].values) {
          const key = r[0] + '|' + r[1] + '|' + r[2];
          linearQty[key] = r[3];
          areaQty[key] = r[4];
        }
      }
    } catch(e) { console.warn('§QTO_WARN dimension query error: ' + e.message); }
  }

  if (!countRows || !countRows.length || !countRows[0].values.length) {
    document.getElementById('info').textContent = 'No data.'; return;
  }

  // Process data with unit-aware quantities
  qtoData = []; discSummary = {};
  grandMaterial = 0; grandLabor = 0; grandEquip = 0; totalQty = 0;
  let qtoWarnCount = 0;

  for (const row of countRows[0].values) {
    const [disc, cls, storey, cnt, meshes] = row;
    const mc = RATES[cls];
    const unit = mc ? mc.unit : 'EA';
    const key = disc + '|' + cls + '|' + storey;

    // §2.1: Resolve quantity by unit type
    let qty;
    if (unit === 'M' && LINEAR_CLASSES.has(cls)) {
      qty = linearQty[key];
      if (!qty || qty <= 0) {
        // §2.3: Fallback — no bbox data, use count
        qty = cnt;
        qtoWarnCount++;
        console.warn('§QTO_WARN no bbox for cls=' + cls + ' storey=' + storey + ', using count fallback (' + cnt + ')');
      }
    } else if (unit === 'M2' && AREA_CLASSES.has(cls)) {
      qty = areaQty[key];
      if (!qty || qty <= 0) {
        qty = cnt;
        qtoWarnCount++;
        console.warn('§QTO_WARN no bbox for cls=' + cls + ' storey=' + storey + ', using count fallback (' + cnt + ')');
      }
    } else {
      qty = cnt;  // EA, KG — count-based
    }

    const matRate = mc ? mc.rate : 0;
    const matTotal = Math.round(matRate * qty * 100) / 100;
    const labor = calcLabor(cls, qty);
    const equip = calcEquipment(cls, labor.days);

    grandMaterial += matTotal;
    grandLabor += labor.cost;
    grandEquip += equip.cost;
    totalQty += qty;

    const r = {
      disc, cls, storey, qty, cnt, meshes, matRate, matTotal, unit,
      laborDays: labor.days, laborCost: labor.cost, laborCrew: labor.crew, laborTrade: labor.trade,
      equipCost: equip.cost, equipDesc: equip.desc, equipDays: equip.days,
      desc: mc ? mc.desc : cls,
      smmSection: mc && mc.smm_section ? mc.smm_section : '',
      labor, // keep full object for schedule
    };
    qtoData.push(r);

    if (!discSummary[disc]) discSummary[disc] = {qty:0, matTotal:0, laborCost:0, equipCost:0};
    discSummary[disc].qty += qty;
    discSummary[disc].matTotal += matTotal;
    discSummary[disc].laborCost += labor.cost;
    discSummary[disc].equipCost += equip.cost;

  }

  // §6.3: Write to qto_cache (if DB is writable — skip in relay mode)
  const tplName = RATE_TEMPLATE_NAME || 'hardcoded_cidb2024';
  if (db) try {
    db.run("DELETE FROM qto_cache WHERE rate_template = '" + tplName.replace(/'/g,"''") + "'");
    const now = new Date().toISOString();
    const stmt = db.prepare("INSERT INTO qto_cache (ifc_class, storey, discipline, qty, uom, element_count, material_cost, labour_cost, equipment_cost, rate_template, computed_at) VALUES (?,?,?,?,?,?,?,?,?,?,?)");
    for (const r of qtoData) {
      stmt.run([r.cls, r.storey, r.disc, r.qty, r.unit, r.cnt, r.matTotal, r.laborCost, r.equipCost, tplName, now]);
    }
    stmt.free();
    console.log('§QTO_CACHE_WRITE template=' + tplName + ' rows=' + qtoData.length);
  } catch(e) { /* read-only DB or no table — skip silently */ }

  const _t1 = performance.now();
  console.log('§QTO_SUMMARY classes=' + qtoData.length + ' material=' + Math.round(grandMaterial) + ' labor=' + Math.round(grandLabor) + ' equip=' + Math.round(grandEquip) + ' warnings=' + qtoWarnCount + ' queryMs=' + Math.round(_t1 - _t0));

  // S254: kernel_ops is the single source of truth. Read directly from DB first,
  // fall back to BroadcastChannel relay, then generateSchedule as last resort.
  let _scheduleSource = 'generateSchedule';

  // Path 1: Read kernel_ops directly from the DB (no viewer needed)
  var _dbOps = [];
  try {
    var _koRes = db.exec(
      "SELECT timestamp, op_type, parameters, input_guids, output_guid " +
      "FROM kernel_ops WHERE undone = 0 AND op_type = 'ELEMENT_PLACE' ORDER BY timestamp"
    );
    if (_koRes.length && _koRes[0].values.length) {
      _dbOps = _koRes[0].values.map(function(row) {
        var params = {};
        try { params = JSON.parse(row[2]); } catch(e) {}
        var inGuids = [];
        try { inGuids = JSON.parse(row[3]); } catch(e) {}
        return {
          start_ts: row[0], end_ts: params._end_ts || (row[0] + 120000),
          op_type: row[1], parameters: params,
          input_guids: inGuids, output_guid: row[4],
          guid: row[4], cls: params.cls || '', storey: params.storey || '',
          phase: params.phase || 'Architecture', resource: params.resource || ''
        };
      });
    }
  } catch(e) { console.log('§KERNEL_OPS_DB_READ error: ' + e.message); }

  if (_dbOps.length) {
    // kernel_ops found in DB — use directly
    scheduleData = buildScheduleFromOps(_dbOps);
    _scheduleSource = 'kernel_ops';
    console.log('§4D_SCHEDULE_SOURCE kernel_ops_db tasks=' + scheduleData.length +
      ' ops=' + _dbOps.length);
  } else {
    // Path 2: Try BroadcastChannel relay from viewer (hourglass may have injected ops)
    const schedRelay = await _tryScheduleRelay(500);
    if (schedRelay && !schedRelay.error && schedRelay.ops && schedRelay.ops.length) {
      scheduleData = buildScheduleFromOps(schedRelay.ops);
      _scheduleSource = 'kernel_ops';
      console.log('§4D_SCHEDULE_SOURCE kernel_ops_relay tasks=' + scheduleData.length +
        ' ops=' + schedRelay.ops.length);
    } else {
      // Path 3: Generate independently (no hourglass has ever run on this DB)
      console.log('§4D_SCHEDULE_SOURCE generateSchedule reason=' +
        (_dbOps.length === 0 ? 'no kernel_ops in DB' : 'relay timeout') +
        ' — Run Hourglass in the viewer to generate a construction schedule, or edit rates.js');
      scheduleData = generateSchedule(qtoData, '2025-01-06');
    }
  }

  // S240 §0.1: Run 8-check audit before any 4D sync
  const auditResult = audit4DSchedule(scheduleData, db, qtoData);

  // Resolve GUIDs — kernel_ops path already has them, generateSchedule path needs DB lookup
  let _guidsAfter = 0;
  if (_scheduleSource === 'kernel_ops') {
    // GUIDs already populated from kernel_ops output_guid — just dedup
    const _assignedGuids = new Set();
    let _guidsBefore = 0;
    for (const t of scheduleData) {
      _guidsBefore += t.guids.length;
      t.guids = t.guids.filter(g => !_assignedGuids.has(g));
      t.guids.forEach(g => _assignedGuids.add(g));
      _guidsAfter += t.guids.length;
    }
    console.log('§4D_GUID_DEDUP before=' + _guidsBefore + ' after=' + _guidsAfter + ' stripped=' + (_guidsBefore - _guidsAfter) + ' source=kernel_ops');
  } else {
    // S240c §P1a: Resolve GUIDs per grouped task
    // Use relayed GUIDs if available (relay path), otherwise DB query (fallback path)
    const _bld = bldName.replace(/'/g,"''");
    for (const t of scheduleData) {
      const classes = t.ifcClasses || (t.ifcClass ? [t.ifcClass] : []);
      if (!classes.length) { t.guids = []; continue; }
      t.guids = [];
      const st = t.storey || '';
      for (const ifcClass of classes) {
        if (_relayGuids && Object.keys(_relayGuids).length > 0) {
          // S253d: Use relayed GUIDs from viewer (no DB needed)
          var rk = ifcClass + '|' + st;
          var guids = _relayGuids[rk] || [];
          t.guids = t.guids.concat(guids);
        } else if (db) {
          // DB path (viewer not open, loaded from OCI)
          try {
            const cls = ifcClass.replace(/'/g,"''");
            const stSafe = st.replace(/'/g,"''");
            const sql = "SELECT guid FROM elements_meta WHERE ifc_class = '" + cls +
              "' AND storey = '" + stSafe + "' AND building = '" + _bld + "'";
            const res = db.exec(sql);
            var guids = res[0] ? res[0].values.map(r => r[0]) : [];
            if (guids.length === 0) {
              const fallback = db.exec("SELECT guid FROM elements_meta WHERE ifc_class = '" +
                cls + "' AND building = '" + _bld + "'");
              guids = fallback[0] ? fallback[0].values.map(r => r[0]) : [];
              if (guids.length > 0) {
                console.log('§4D_GUID_FALLBACK class=' + ifcClass + ' storey=' + t.storey + ' fallbackCount=' + guids.length);
              }
            }
            t.guids = t.guids.concat(guids);
          } catch(e) {}
        }
      }
    }
    console.log('§4D_GUID_SOURCE ' + (_relayGuids && Object.keys(_relayGuids).length > 0 ? 'relay' : (db ? 'db' : 'NONE — guids will be empty')));
    // S240c §P1b: Deduplicate — each GUID belongs to exactly one task (first in phase order wins)
    const _assignedGuids = new Set();
    let _guidsBefore = 0;
    for (const t of scheduleData) {
      _guidsBefore += t.guids.length;
      t.guids = t.guids.filter(g => !_assignedGuids.has(g));
      t.guids.forEach(g => _assignedGuids.add(g));
      _guidsAfter += t.guids.length;
    }
    console.log('§4D_GUID_DEDUP before=' + _guidsBefore + ' after=' + _guidsAfter + ' stripped=' + (_guidsBefore - _guidsAfter));
    // S240c §P1d: Coverage witness — every element must be in exactly one task
    let _totalElements = 0;
    try {
      const r = db.exec("SELECT COUNT(*) FROM elements_meta WHERE building = '" + _bld + "'");
      _totalElements = r[0] ? r[0].values[0][0] : 0;
    } catch(e) {}
    const _orphanCount = _totalElements - _assignedGuids.size;
    console.log('§4D_COVERAGE total=' + _totalElements + ' assigned=' + _assignedGuids.size + ' orphan=' + _orphanCount);
  }

  const totalGuids = _guidsAfter;
  const zeroGuidTasks = scheduleData.filter(t => t.guids.length === 0);
  console.log('§4D_GUID_RESOLVE tasks=' + scheduleData.length + ' totalGuids=' + totalGuids + ' zeroGuid=' + zeroGuidTasks.length +
    (zeroGuidTasks.length ? ' [' + zeroGuidTasks.slice(0,5).map(t=>t.name).join(', ') + ']' : ''));

  const grandTotal = grandMaterial + grandLabor + grandEquip;
  const projDaysInit = scheduleData.length ? Math.max(...scheduleData.map(t=>t.finishDay)) : 0;
  console.log(`§QTO: ${qtoData.length} rows | ${totalQty} elements`);
  console.log(`§TOTALS: Mat ${CUR}${grandMaterial.toLocaleString()} | Lab ${CUR}${grandLabor.toLocaleString()} | Eq ${CUR}${grandEquip.toLocaleString()} | Grand ${CUR}${grandTotal.toLocaleString()}`);
  console.log(`§SCHEDULE: ${scheduleData.length} tasks | ${projDaysInit} calendar days | source=${_scheduleSource} | db=${db ? 'loaded' : 'NULL'}`);
  // Dump each task for debugging
  for (const t of scheduleData) {
    console.log('§SCHED_TASK "' + t.name + '" day=' + t.startDay + '-' + t.finishDay +
      ' dur=' + t.duration + ' bar_end=' + (t.startDay + t.duration) +
      ' guids=' + (t.guids ? t.guids.length : 0) + ' phase=' + t.phase);
  }
  const unmapped = [...new Set(qtoData.map(r=>r.cls).filter(c=>!SEQUENCE_RULES[c]))];
  console.log(`§UNMAPPED: ${unmapped.length ? unmapped.join(', ') : 'NONE'}`);
  document.getElementById('info').textContent =
    `${bldName} | ${totalQty.toLocaleString()} ${_TRL.ui_elements||'elements'} | ${CUR}${grandTotal.toLocaleString()} (${_TRL.h_material||'Mat'} ${grandMaterial.toLocaleString()} + ${_TRL.h_labour||'Lab'} ${grandLabor.toLocaleString()} + ${_TRL.h_equipment||'Equip'} ${grandEquip.toLocaleString()})`;


  // S224: Load diff DB if present — compute variance for VO sheets in Excel
  if (DIFF_DB_URL) {
    try {
      const diffBuf = await fetchDbBuffer(DIFF_DB_URL);
      diffDb = new SQL.Database(new Uint8Array(diffBuf));
      const guids1 = new Set(db.exec("SELECT guid FROM elements_meta")[0].values.map(r => r[0]));
      const guids2 = new Set(diffDb.exec("SELECT guid FROM elements_meta")[0].values.map(r => r[0]));
      const added = [...guids2].filter(g => !guids1.has(g));
      const common = [...guids2].filter(g => guids1.has(g));
      const changed = common.filter(g => {
        const r1 = db.exec("SELECT element_name, material_rgba, storey FROM elements_meta WHERE guid='" + g.replace(/'/g, "''") + "'");
        const r2 = diffDb.exec("SELECT element_name, material_rgba, storey FROM elements_meta WHERE guid='" + g.replace(/'/g, "''") + "'");
        return JSON.stringify(r1[0]?.values[0]) !== JSON.stringify(r2[0]?.values[0]);
      });
      // S225: merge vs revision — <10% overlap = merge (don't flag base as removed)
      const overlap = common.length / Math.max(guids1.size, guids2.size);
      const isMerge = overlap < 0.1;
      const removed = isMerge ? [] : [...guids1].filter(g => !guids2.has(g));
      diffResult = { added, removed, changed, isMerge };
      console.log('[S225] §BOQ_DIFF added=' + added.length + ' removed=' + removed.length + ' changed=' + changed.length + ' mode=' + (isMerge ? 'MERGE' : 'REVISION'));
      var modeTag = isMerge ? ' | MERGE: +' + added.length + ' new elements' : ' | VARIANCE: +' + added.length + ' −' + removed.length + ' ~' + changed.length;
      document.getElementById('info').textContent += modeTag;
    } catch(e) {
      console.log('[S224] §BOQ_DIFF_ERROR ' + e.message);
    }
  }

  renderCharts();
}

// ============================================================================
// RENDER ALL CHARTS (4 existing enhanced + 5 new from schedule_export.py)
// ============================================================================
function renderCharts() {
  const c = document.getElementById('charts');
  c.innerHTML = '';
  chartInstances.forEach(ci => ci.destroy());
  chartInstances = [];
  const _tCharts = performance.now();
  console.log('§RENDER_CHARTS: start');
  // Light chart animations — quick, no infinite loops
  Chart.defaults.animation = { duration: 800 };
  function logChart(n, type, title, dataLen) {
    console.log(`§CHART_${n} [${type}] "${title}": ${dataLen} data points — ${dataLen > 0 ? 'OK' : 'EMPTY'} +${Math.round(performance.now() - _tCharts)}ms`);
  }

  // Deferred chart rendering: only render when scrolled into view
  function _deferChart(box, renderFn) {
    if ('IntersectionObserver' in window) {
      var rendered = false;
      var obs = new IntersectionObserver(function(entries) {
        if (!rendered && entries[0].isIntersecting) {
          rendered = true; obs.disconnect(); renderFn();
        }
      }, { rootMargin: '200px' });
      obs.observe(box);
    } else {
      renderFn(); // fallback: render immediately
    }
  }

  const discs = Object.keys(discSummary);

  // ── 1. Cost Pie by Discipline (M+L+E) ──
  const pieBox = el('div','chart-box pie-chart');
  pieBox.innerHTML = '<h2>' + _TRL.t_cost_by_disc + ' (' + CUR + ')</h2>';
  const pieCanvas = el('canvas');
  pieBox.appendChild(pieCanvas); c.appendChild(pieBox);

  const discTotals = discs.map(d => discSummary[d].matTotal + discSummary[d].laborCost + discSummary[d].equipCost);
  chartInstances.push(new Chart(pieCanvas, {
    type:'pie',
    data:{labels:discs, datasets:[{data:discTotals, backgroundColor:discs.map(d=>DISC_COLORS[d]||'#888'), borderWidth:1}]},
    options:{aspectRatio:1, layout:{padding:0}, plugins:{legend:{position:'bottom',labels:{color:'#ddd',font:{size:14,weight:'bold'}}}}}
  }));
  logChart(1,'Pie','Cost Breakdown by Discipline',discs.length);

  // ── 2. Cost Components by Discipline — M/L/E (boq_export.py "Cost Components by Discipline") ──
  const mleBox = el('div','chart-box');
  mleBox.innerHTML = '<h2>' + _TRL.t_cost_components + ' (' + CUR + ')</h2>';
  const mleCanvas = el('canvas');
  mleBox.appendChild(mleCanvas); c.appendChild(mleBox);

  chartInstances.push(new Chart(mleCanvas, {
    type:'bar',
    data:{
      labels:discs,
      datasets:[
        {label:_TRL.h_material,data:discs.map(d=>discSummary[d].matTotal),backgroundColor:'#70AD47'},
        {label:_TRL.h_labour,data:discs.map(d=>discSummary[d].laborCost),backgroundColor:'#FFC000'},
        {label:_TRL.h_equipment,data:discs.map(d=>discSummary[d].equipCost),backgroundColor:'#5B9BD5'},
      ]
    },
    options:{scales:{y:{stacked:true,ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}},x:{stacked:true,ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}}},plugins:{legend:{labels:{color:'#ddd',font:{size:13}}}}}
  }));
  logChart(2,'Bar','Cost Components by Discipline',discs.length);

  // ── 3. Task Distribution by Phase — pie (schedule_export.py "Task Distribution by Phase") ──
  const taskPhaseCounts = {};
  for (const t of scheduleData) taskPhaseCounts[t.phase] = (taskPhaseCounts[t.phase]||0) + 1;
  const tpPhases = Object.keys(taskPhaseCounts);

  const tpBox = el('div','chart-box pie-chart');
  tpBox.innerHTML = '<h2>' + _TRL.t_task_dist_phase + '</h2>';
  const tpCanvas = el('canvas');
  tpBox.appendChild(tpCanvas); c.appendChild(tpBox);

  chartInstances.push(new Chart(tpCanvas, {
    type:'pie',
    data:{labels:tpPhases, datasets:[{data:tpPhases.map(p=>taskPhaseCounts[p]), backgroundColor:tpPhases.map(p=>PHASE_COLORS[p]||'#888'), borderWidth:1}]},
    options:{aspectRatio:1, layout:{padding:0}, plugins:{legend:{position:'bottom',labels:{color:'#ddd',font:{size:14,weight:'bold'}}}}}
  }));
  logChart(3,'Pie','Task Distribution by Phase',tpPhases.length);

  // ── 4. Task Count by Discipline — bar (schedule_export.py "Task Count by Discipline") ──
  const taskDiscCounts = {};
  for (const t of scheduleData) taskDiscCounts[t.discipline] = (taskDiscCounts[t.discipline]||0) + 1;
  const tdDiscs = Object.keys(taskDiscCounts);

  const tdBox = el('div','chart-box');
  tdBox.innerHTML = '<h2>' + _TRL.t_task_count_disc + '</h2>';
  const tdCanvas = el('canvas');
  tdBox.appendChild(tdCanvas); c.appendChild(tdBox);

  chartInstances.push(new Chart(tdCanvas, {
    type:'bar',
    data:{labels:tdDiscs, datasets:[{label:_TRL.h_task||'Tasks',data:tdDiscs.map(d=>taskDiscCounts[d]),backgroundColor:tdDiscs.map(d=>DISC_COLORS[d]||'#888')}]},
    options:{scales:{y:{title:{display:true,text:'Number of Tasks',color:'#fff',font:{size:15}},ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}},x:{title:{display:true,text:'Discipline',color:'#fff',font:{size:15}},ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}}},plugins:{legend:{display:false}}}
  }));
  logChart(4,'Bar','Task Count by Discipline',tdDiscs.length);

  // ── 5. Phase Duration Analysis (horizontal bar — from schedule_export.py) ──
  const phaseDur = {};
  for (const t of scheduleData) phaseDur[t.phase] = (phaseDur[t.phase]||0) + t.duration;
  const pdPhases = Object.keys(phaseDur).sort((a,b) => phaseDur[b]-phaseDur[a]);

  const pdBox = el('div','chart-box');
  pdBox.innerHTML = '<h2>' + _TRL.t_phase_duration + '</h2>';
  const pdCanvas = el('canvas');
  pdBox.appendChild(pdCanvas); c.appendChild(pdBox);

  chartInstances.push(new Chart(pdCanvas, {
    type:'bar',
    data:{labels:pdPhases, datasets:[{label:'Days',data:pdPhases.map(p=>Math.round(phaseDur[p])),backgroundColor:pdPhases.map(p=>PHASE_COLORS[p]||'#888')}]},
    options:{indexAxis:'y',scales:{x:{title:{display:true,text:'Days',color:'#fff',font:{size:15}},ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}},y:{ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}}},plugins:{legend:{display:false}}}
  }));
  logChart(5,'H-Bar','Phase Duration',pdPhases.length);

  // ── 6. Resource Workload — Man-Days by Phase (column — from schedule_export.py) ──
  const phaseMandays = {};
  for (const t of scheduleData) phaseMandays[t.phase] = (phaseMandays[t.phase]||0) + t.duration * t.crew;
  const mdPhases = Object.keys(phaseMandays).sort((a,b) => phaseMandays[b]-phaseMandays[a]);

  const mdBox = el('div','chart-box');
  mdBox.innerHTML = '<h2>' + _TRL.t_resource_workload + '</h2>';
  const mdCanvas = el('canvas');
  mdBox.appendChild(mdCanvas); c.appendChild(mdBox);

  chartInstances.push(new Chart(mdCanvas, {
    type:'bar',
    data:{labels:mdPhases, datasets:[{label:_TRL.h_man_days||'Man-Days',data:mdPhases.map(p=>Math.round(phaseMandays[p])),backgroundColor:mdPhases.map(p=>PHASE_COLORS[p]||'#888')}]},
    options:{scales:{y:{title:{display:true,text:_TRL.h_man_days||'Man-Days',color:'#fff',font:{size:15}},ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}},x:{ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}}},plugins:{legend:{display:false}}}
  }));
  logChart(6,'Column','Resource Workload',mdPhases.length);

  // ── 7. S-Curve Progress (line — deferred render on scroll) ──
  if (scheduleData.length) {
    const scBox = el('div','chart-box');
    scBox.innerHTML = '<h2>' + _TRL.t_s_curve + '</h2>';
    const scCanvas = el('canvas');
    scBox.appendChild(scCanvas); c.appendChild(scBox);
    _deferChart(scBox, function() {
      const allFinish = scheduleData.map(t => t.finishDay);
      const maxDay = Math.max(...allFinish);
      console.log('§SCURVE_DATA maxDay=' + maxDay + ' tasks=' + scheduleData.length + ' finishDays=' + allFinish.slice(0,5).join(','));
      const totalTasks = scheduleData.length;
      const weekLabels = [], weekPcts = [];
      const totalWeeks = Math.max(1, Math.ceil(maxDay / 7));
      const sampleInterval = Math.max(1, Math.floor(totalWeeks / 20));
      for (let w = 0; w <= totalWeeks; w += sampleInterval) {
        const dayEnd = w * 7;
        const completed = scheduleData.filter(t => t.finishDay <= dayEnd).length;
        weekLabels.push(`W${w}`);
        weekPcts.push(Math.round(completed / totalTasks * 1000) / 10);
      }
      if (weekPcts[weekPcts.length-1] < 100) { weekLabels.push(`W${totalWeeks}`); weekPcts.push(100); }
      chartInstances.push(new Chart(scCanvas, {
        type:'line',
        data:{labels:weekLabels, datasets:[{label:'% Complete',data:weekPcts,borderColor:'#4fc3f7',backgroundColor:'rgba(79,195,247,0.1)',fill:true,tension:0.3}]},
        options:{scales:{y:{min:0,max:100,title:{display:true,text:'% Complete',color:'#fff',font:{size:15}},ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}},x:{title:{display:true,text:'Project Week',color:'#fff',font:{size:15}},ticks:{color:'#ddd',font:{size:13}},grid:{color:'rgba(255,255,255,0.1)'}}},plugins:{legend:{display:false}}}
      }));
      logChart(7,'Line','S-Curve Progress',weekLabels.length);
    });
  }

  // ── 8. Milestone Timeline (horizontal bar — from schedule_export.py) ──
  // S235: Restored from S225 sandbox original. S226 _TRL refactor broke this by
  // redesigning to phase-span Gantt (duplicated chart 9) and dropping canvas.height.
  const phaseDates = {};
  for (const t of scheduleData) {
    if (!phaseDates[t.phase]) phaseDates[t.phase] = {start:t.startDay, end:t.finishDay};
    else {
      phaseDates[t.phase].start = Math.min(phaseDates[t.phase].start, t.startDay);
      phaseDates[t.phase].end = Math.max(phaseDates[t.phase].end, t.finishDay);

// Log collector — all §-tagged lines go here, auto-downloaded as .log after each save
var _logLines = [];
function _log(msg) { _logLines.push(new Date().toISOString() + ' ' + msg); console.log(msg); }
function _downloadLog(label) {
  // Delay: browser blocks rapid successive <a>.click() downloads — let Excel go first
  var lines = _logLines.slice();
  _logLines = [];
  setTimeout(function() {
    var text = lines.join('\n') + '\n';
    var blob = new Blob([text], { type: 'text/plain' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chart_test_' + label + '_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.log';
    a.click();
    URL.revokeObjectURL(a.href);
  }, 1500);
}

// prepare/restore/capture functions retired. Only verify + log remain.
var _chartTestPass = 0, _chartTestFail = 0;
function _ct(pass, ci, name, test, detail) {
  var tag = pass ? 'PASS' : 'FAIL';
  if (pass) _chartTestPass++; else _chartTestFail++;
  _log('[S226] §CHART_TEST ' + tag + ' chart=' + ci + ' "' + name + '" ' + test + ' — ' + detail);
}

// ── _TRL verification: proves localization is active, no hardcoded RM/USD ──
function _verifyTRL(wb, label) {
  _log('[S226] §TRL_VERIFY start — ' + label);

  // 1. _TRL object completeness — every key must have a non-empty string value
  var missing = [];
  for (var k in _TRL_DEFAULTS) {
    if (typeof _TRL[k] === 'string' && _TRL[k].trim() === '') missing.push(k);
    if (_TRL[k] === undefined || _TRL[k] === null) missing.push(k);
  }
  _ct(missing.length === 0, -1, label, 'TRL_COMPLETE',
    missing.length === 0 ? Object.keys(_TRL_DEFAULTS).length + ' keys all populated' : 'empty keys: ' + missing.join(', '));

  // 2. Currency symbols active
  _ct(CUR === _TRL.cur, -1, label, 'TRL_CUR_MATCH', 'CUR=' + CUR + ' _TRL.cur=' + _TRL.cur);
  _ct(CUR2 === _TRL.cur2, -1, label, 'TRL_CUR2_MATCH', 'CUR2=' + CUR2 + ' _TRL.cur2=' + _TRL.cur2);
  _ct(typeof CUR_RATE === 'number' && CUR_RATE > 0, -1, label, 'TRL_RATE_VALID', 'CUR_RATE=' + CUR_RATE);

  // 3. Excel sheet names — must match _TRL values, no hardcoded English
  if (wb) {
    var sheetNames = wb.worksheets.map(function(ws) { return ws.name; });
    var trlSheets = label === '5D' ? [_TRL.s_cover, _TRL.s_exec_summary, _TRL.s_material, _TRL.s_labour, _TRL.s_equipment]
      : [_TRL.s_schedule, _TRL.s_proj_summary, _TRL.s_dashboard];
    var sheetHits = 0;
    for (var i = 0; i < trlSheets.length; i++) {
      if (sheetNames.indexOf(trlSheets[i]) >= 0) sheetHits++;
    }
    _ct(sheetHits === trlSheets.length, -1, label, 'TRL_SHEET_NAMES',
      sheetHits + '/' + trlSheets.length + ' _TRL sheets found in [' + sheetNames.join(', ') + ']');

    // 4. Scan first 5 rows of each sheet for hardcoded 'RM ' or ' USD ' (should be CUR/CUR2)
    var hardcoded = [];
    var bannedRe = /\bRM\s|\sRM\b|\bUSD\s|\sUSD\b/;
    // Only flag if CUR is not RM and CUR2 is not USD (i.e. localization changed them)
    // If defaults are active, RM/USD are expected — so test the ABSENCE of wrong currency
    wb.worksheets.forEach(function(ws) {
      ws.eachRow({ includeEmpty: false }, function(row, rn) {
        if (rn > 5) return;
        row.eachCell(function(cell) {
          var v = String(cell.value || '');
          // Check currency symbol appears correctly
          if (v.indexOf('(' + CUR + ')') >= 0 || v.indexOf(CUR + ' ') >= 0) return; // OK
          if (CUR !== 'RM' && bannedRe.test(v)) hardcoded.push(ws.name + ':R' + rn + '="' + v.slice(0, 40) + '"');
        });
      });
    });
    _ct(hardcoded.length === 0, -1, label, 'TRL_NO_HARDCODE',
      hardcoded.length === 0 ? 'no hardcoded RM/USD in headers (CUR=' + CUR + ')' : hardcoded.join('; '));
  }

  // 5. HTML chart titles — verify they use _TRL values
  var h2s = document.querySelectorAll('.chart-box h2');
  var trlTitles = [_TRL.t_cost_by_disc, _TRL.t_cost_components, _TRL.t_task_dist_phase,
    _TRL.t_task_count_disc, _TRL.t_phase_duration, _TRL.t_resource_workload,
    _TRL.t_s_curve, _TRL.t_milestone, _TRL.t_gantt];
  var titleHits = 0;
  for (var ti = 0; ti < h2s.length; ti++) {
    var txt = h2s[ti].textContent;
    for (var tj = 0; tj < trlTitles.length; tj++) {
      if (txt.indexOf(trlTitles[tj]) >= 0) { titleHits++; break; }
    }
  }
  _ct(titleHits >= Math.min(h2s.length, trlTitles.length), -1, label, 'TRL_CHART_TITLES',
    titleHits + '/' + h2s.length + ' HTML chart titles match _TRL values');

  // 6. HTML table headers — verify CUR symbol appears, not hardcoded RM
  var ths = document.querySelectorAll('table th');
  var curInHeaders = 0;
  for (var hi = 0; hi < ths.length; hi++) {
    if (ths[hi].textContent.indexOf(CUR) >= 0) curInHeaders++;
  }
  _ct(curInHeaders > 0, -1, label, 'TRL_HTML_CUR',
    curInHeaders + ' table headers contain CUR="' + CUR + '"');

  // 7. Rate source attribution
  var fullTables = document.querySelectorAll('.chart-box.full');
  var footerText = ''; for (var ft = 0; ft < fullTables.length; ft++) footerText += fullTables[ft].textContent;
  _ct(footerText.indexOf(_TRL.rate_source) >= 0, -1, label, 'TRL_RATE_SOURCE',
    'footer contains "' + _TRL.rate_source + '": ' + (footerText.indexOf(_TRL.rate_source) >= 0));

  _log('[S226] §TRL_VERIFY done — ' + label);
}

// ── Maths verification: proves numeric outputs are correct ──
function _verifyMaths(wb, label) {
  _log('[S226] §MATHS_VERIFY start — ' + label);

  // 1. Grand totals cross-check: sum of disc totals must equal grand totals
  var sumMat = 0, sumLab = 0, sumEq = 0;
  for (var d in discSummary) {
    sumMat += discSummary[d].matTotal;
    sumLab += discSummary[d].laborCost;
    sumEq  += discSummary[d].equipCost;
  }
  _ct(sumMat === grandMaterial, -1, label, 'MATHS_MAT_SUM',
    'disc_sum=' + sumMat + ' grand=' + grandMaterial + (sumMat !== grandMaterial ? ' MISMATCH' : ''));
  _ct(sumLab === grandLabor, -1, label, 'MATHS_LAB_SUM',
    'disc_sum=' + sumLab + ' grand=' + grandLabor + (sumLab !== grandLabor ? ' MISMATCH' : ''));
  _ct(sumEq === grandEquip, -1, label, 'MATHS_EQ_SUM',
    'disc_sum=' + sumEq + ' grand=' + grandEquip + (sumEq !== grandEquip ? ' MISMATCH' : ''));

  // 2. Grand total = mat + lab + eq
  var gt = grandMaterial + grandLabor + grandEquip;
  _ct(gt === grandMaterial + grandLabor + grandEquip, -1, label, 'MATHS_GRAND',
    CUR + ' ' + gt.toLocaleString() + ' = Mat ' + grandMaterial.toLocaleString() + ' + Lab ' + grandLabor.toLocaleString() + ' + Eq ' + grandEquip.toLocaleString());

  // 3. Currency conversion sample: first disc total → secondary currency
  var firstDisc = Object.keys(discSummary)[0];
  if (firstDisc) {
    var ds = discSummary[firstDisc];
    var discTotal = ds.matTotal + ds.laborCost + ds.equipCost;
    var converted = fmtCur2(discTotal);
    var expected = Math.round(discTotal / CUR_RATE * 100) / 100;
    _ct(converted === expected, -1, label, 'MATHS_CUR_CONV',
      firstDisc + ': ' + CUR + ' ' + discTotal.toLocaleString() + ' ÷ ' + CUR_RATE + ' = ' + CUR2 + ' ' + converted + ' (expected ' + expected + ')');
  }

  // 4. QTO row count vs total elements
  var qtoSum = 0;
  for (var i = 0; i < qtoData.length; i++) qtoSum += qtoData[i].qty;
  _ct(qtoSum === totalQty, -1, label, 'MATHS_QTY_SUM',
    'qto_rows=' + qtoData.length + ' qty_sum=' + qtoSum + ' totalQty=' + totalQty + (qtoSum !== totalQty ? ' MISMATCH' : ''));

  // 5. Rate spot-check: first 3 QTO rows — rate × qty = matTotal
  for (var ri = 0; ri < Math.min(3, qtoData.length); ri++) {
    var r = qtoData[ri];
    var calc = Math.round(r.matRate * r.qty * 100) / 100;
    _ct(Math.abs(calc - r.matTotal) < 0.02, -1, label, 'MATHS_RATE_CHECK',
      r.cls + ': rate=' + r.matRate + ' × qty=' + (Math.round(r.qty*100)/100) + ' = ' + calc + ' (stored=' + r.matTotal + ')' + (Math.abs(calc - r.matTotal) >= 0.02 ? ' MISMATCH' : ''));
  }

  // 6. Excel sheet count
  if (wb) {
    var sc = wb.worksheets.length;
    var minSheets = label === '5D' ? 6 : 3;
    _ct(sc >= minSheets, -1, label, 'MATHS_SHEET_COUNT',
      sc + ' sheets in workbook (min ' + minSheets + ' expected for ' + label + ')');
  }

  // 7. Pie chart data sum = grand total (chart[0] is cost pie)
  if (chartInstances.length > 0 && chartInstances[0].config.type === 'pie') {
    var pieData = chartInstances[0].data.datasets[0].data;
    var pieSum = 0;
    for (var pi = 0; pi < pieData.length; pi++) pieSum += pieData[pi];
    _ct(pieSum === gt, -1, label, 'MATHS_PIE_SUM',
      'pie_sum=' + pieSum.toLocaleString() + ' grand=' + gt.toLocaleString() + (pieSum !== gt ? ' MISMATCH — pie slices do not add up' : ''));
  }

  // 8. Canvas dimensions after prepare (from last capture log)
  // Already covered by RATIO_MATCH per chart — skip duplicate

  _log('[S226] §MATHS_VERIFY done — ' + label);
}

let light = false;
// §3.1: Open MEP BOQ report in new tab — passes same DB + rates params
function openMepReport() {
  var p = new URLSearchParams(location.search);
  var mepUrl = 'mep_report.html?db=' + encodeURIComponent(p.get('db') || DB_URL);
  if (p.get('bld') || bldName) mepUrl += '&bld=' + encodeURIComponent(p.get('bld') || bldName);
  if (RATE_TEMPLATE_NAME) mepUrl += '&rates=' + encodeURIComponent(RATE_TEMPLATE_NAME);
  window.open(mepUrl, '_blank');
}

function toggleTheme() {
  light = !light;
  document.body.style.background = light ? '#f0f0f0' : '#1a1a2e';
  document.body.style.color = light ? '#222' : '#e0e0e0';
  document.querySelectorAll('h1,h2').forEach(e => e.style.color = light ? '#0077cc' : '#4fc3f7');
  document.querySelectorAll('th').forEach(e => {
    e.style.background = light ? 'rgba(0,119,204,0.1)' : 'rgba(79,195,247,0.15)';
    e.style.color = light ? '#0077cc' : '#4fc3f7';
  });
  document.querySelectorAll('.chart-box').forEach(e => {
    e.style.background = light ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.05)';
    e.style.borderColor = light ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.08)';
  });
}
