name: CI
on: push

permissions:
  contents: write
  pull-requests: write

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install lint deps
        run: npm ci

      - name: JS syntax check
        run: find viewer -name '*.js' ! -path '*/lib/*' -exec node --check {} +

      - name: Undefined-reference gate (no-undef)
        run: npx eslint viewer

      - name: Import worker safety
        run: node tests/test_import_worker_safety.js

      - name: SW precache audit
        run: node tests/audit_sw_precache.js

      - name: Script tag audit
        run: node tests/audit_script_tags.js

      - name: Split-DB wiring
        run: node tests/test_s274_split_db_wiring.js

      - name: Input registry audit
        run: node tests/audit_input_registry.js

      - name: Spec file paths audit
        run: node tests/audit_spec_paths.js

      - name: Find multi-select logic (NAV_FIND_002)
        run: node tests/test_find_multiselect.js

      - name: Sunglass recolor guard (S280f — colorless-material crash)
        run: node tests/test_recolor_guard.js

      - name: Ground texture engine (S280g)
        run: node tests/test_ground_texture.js

  e2e-tests:
    runs-on: ubuntu-latest
    needs: fast-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: tests
        run: npm ci && npx playwright install chromium

      - name: Download test data
        working-directory: tests
        run: ./setup-test-data.sh

      - name: DB integrity audit
        working-directory: tests
        run: node audit_db_integrity.js

      - name: Golden path — IFC drop → viewer (ensures import works)
        working-directory: tests
        run: npx playwright test --project=desktop s274-golden-path

      - name: Auto-merge PR when all checks pass
        if: github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.ref_name }}" || true
